<!DOCTYPE html>
<!-- v9 -->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Olivera CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}
    .hidden{display:none}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#185FA5,#0C447C)}
    .login-box{background:#fff;border-radius:16px;padding:2.5rem;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
    .login-box h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#185FA5}
    .login-box p{font-size:13px;color:#666;margin-bottom:1.5rem}
    .alert{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a}
    .form-group textarea{resize:vertical}
    .row{display:flex;gap:10px}
    .row .form-group{flex:1}
    .btn{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-weight:500}
    .btn:hover{background:#f5f5f5}
    .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn-primary:hover{background:#0C447C}
    .btn-success{background:#065f46;color:#fff;border-color:#065f46}
    .btn-success:hover{background:#044232}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-full{width:100%;padding:12px;font-size:15px}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .topbar-logo{font-size:16px;font-weight:700;color:#185FA5}
    .topbar-logo span{color:#1a1a1a;font-weight:400}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .rol-badge{font-size:11px;background:#EFF6FF;color:#185FA5;padding:2px 8px;border-radius:20px;font-weight:500}
    .nav{display:flex;gap:4px;padding:10px 24px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
    .nav-btn{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
    .nav-btn.active{background:#EFF6FF;color:#185FA5}
    .content{padding:24px;max-width:1100px;margin:0 auto}
    .grid-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:1.5rem}
    .metric{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .metric-label{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
    .metric-value{font-size:22px;font-weight:700}
    .metric-value.green{color:#065f46}
    .metric-value.red{color:#991b1b}
    .metric-value.blue{color:#1e40af}
    .metric-value.amber{color:#92400e}
    .card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .card-title{font-size:15px;font-weight:600}
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:1.5rem}
    .chart-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .chart-title{font-size:13px;font-weight:600;color:#555;margin-bottom:1rem}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;color:#888;font-weight:500;border-bottom:1px solid #eee;font-size:12px;text-transform:uppercase;letter-spacing:0.3px}
    td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-amber{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}
    .badge-teal{background:#ccfbf1;color:#0f766e}
    .progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-top:8px}
    .progress-fill{height:8px;border-radius:4px;transition:width 0.3s}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .modal{background:#fff;border-radius:16px;padding:1.75rem;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .modal-title{font-size:16px;font-weight:600}
    .close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1}
    .loading{text-align:center;padding:3rem;color:#888;font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .section-title{font-size:18px;font-weight:700}
    .prop-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .prop-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
    .obj-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem}
    .obj-actions{display:flex;gap:6px;margin-top:12px}
    .empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
    .section-divider{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:1rem 0 0.5rem;border-bottom:1px solid #eee;padding-bottom:6px}
    .tabs-secondary{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
    .tab-sec{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;font-weight:500;color:#666}
    .tab-sec.active{background:#185FA5;color:#fff;border-color:#185FA5}
    .agente-selector{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
    .agente-chip{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-weight:500;color:#666}
    .agente-chip.active{background:#185FA5;color:#fff;border-color:#185FA5}
    .dev-card{background:#fff;border-radius:12px;border:2px solid #dbeafe;padding:1.25rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
    .dev-card:hover{box-shadow:0 4px 16px rgba(24,95,165,0.15);border-color:#185FA5}
    .prop-link{cursor:pointer;color:#185FA5;font-weight:700;font-size:15px}
    .prop-link:hover{text-decoration:underline}
    .ficha-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
    .ficha-row:last-child{border-bottom:none}
    .ficha-label{color:#888;font-weight:500}
    .ficha-value{font-weight:600;text-align:right}
    .distrib-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin:1rem 0}
    .distrib-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
    .distrib-sep{border-top:1px dashed #bbf7d0;margin:6px 0}
    .distrib-total{display:flex;justify-content:space-between;padding:8px 0 0;font-size:15px;font-weight:700;border-top:2px solid #bbf7d0;margin-top:6px;color:#065f46}
    .cc-section{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .cc-section-title{font-size:14px;font-weight:600;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
    .team-widget{background:linear-gradient(135deg,#185FA5,#0C447C);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;color:#fff}
    .team-widget-title{font-size:14px;font-weight:600;opacity:0.85;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.5px}
    .team-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
    .team-metric{background:rgba(255,255,255,0.12);border-radius:10px;padding:12px 16px}
    .team-metric-label{font-size:10px;opacity:0.75;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
    .team-metric-value{font-size:18px;font-weight:700}
    .referido-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#ccfbf1;color:#0f766e;margin-left:6px}
    .no-referido-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#f3f4f6;color:#374151;margin-left:6px}
  </style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h1>Team Olivera</h1>
    <p>CRM Inmobiliario · teamolivera.com</p>
    <div id="loginError" class="alert hidden"></div>
    <form autocomplete="off" onsubmit="return false">
      <input type="text" style="display:none"/><input type="password" style="display:none"/>
      <div class="form-group"><label>Usuario</label><input id="loginUser" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>
      <div class="form-group"><label>Contraseña</label><input id="loginPass" type="password" autocomplete="new-password"/></div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Entrar</button>
    </form>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="topbar">
    <div class="topbar-logo">Team Olivera <span>CRM</span></div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar" id="avatarTop"></div>
        <div>
          <div style="font-weight:600;font-size:13px" id="userNameTop"></div>
          <div class="rol-badge" id="userRolTop"></div>
        </div>
      </div>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showTab('propiedades',this)">Propiedades</button>
    <button class="nav-btn" onclick="showTab('busquedas',this)">Búsquedas</button>
    <button class="nav-btn" onclick="showTab('desarrollos',this)">Desarrollos</button>
    <button class="nav-btn" onclick="showTab('finanzas',this)">Finanzas</button>
    <button class="nav-btn" onclick="showTab('objetivos',this)">Objetivos</button>
    <button class="nav-btn" id="btnEquipo" style="display:none" onclick="showTab('equipo',this)">Panel Equipo</button>
  </div>
  <div class="content" id="tabContent"></div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
var API='https://sheetdb.io/api/v1/8al8hyqbj13qm';
var currentUser=null;
var allAgentes=[];

function getSheet(s,cb){fetch(API+'?sheet='+s).then(function(r){return r.json();}).then(function(d){cb(null,d);}).catch(function(e){cb(e,null);});}
function addRow(s,data,cb){fetch(API+'?sheet='+s,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[data]})}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});}
function delRow(s,id,cb){fetch(API+'/id/'+id+'?sheet='+s,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});}
function updRow(s,id,data,cb){fetch(API+'/id/'+id+'?sheet='+s,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:data})}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});}
function fmt(n){return Number(n||0).toLocaleString('es-AR');}
function chipLabel(n){return n===currentUser.nombre?'Yo':n.split(' ').slice(-1)[0];}
function v(id){return document.getElementById(id)?document.getElementById(id).value:'';}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function uid(){return Date.now().toString();}
function today(){return new Date().toISOString().slice(0,10);}
function loading(){document.getElementById('tabContent').innerHTML='<div class="loading"><span class="spinner"></span>Cargando...</div>';}
function pct(a,m){return Math.min(100,Math.round(Number(a||0)/Number(m||1)*100))||0;}
function progColor(p){return p>=80?'#065f46':p>=50?'#185FA5':'#92400e';}
function estadoBadge(e){
  if(e==='En venta'||e==='Activa')return 'badge-blue';
  if(e==='Vendida')return 'badge-green';
  if(e==='Reservada')return 'badge-amber';
  if(e==='En alquiler')return 'badge-purple';
  if(e==='Alquilada')return 'badge-green';
  if(e==='Cancelada')return 'badge-red';
  return 'badge-gray';
}
function openModal(){document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';document.getElementById('modalBox').innerHTML='';}
function closeModalOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

// Distribución según referido (para operaciones de agentes)
function getDistrib(referido){
  // referido: si = Gonzalo refirió → TL 45%, Agente 35%
  // no referido → Agente 45%, TL 35%
  if(referido==='si')return{agente:35,tl:45,oficina:20};
  return{agente:45,tl:35,oficina:20};
}

function mostrarApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('avatarTop').textContent=currentUser.initials;
  document.getElementById('userNameTop').textContent=currentUser.nombre;
  document.getElementById('userRolTop').textContent=currentUser.rol;
  if(currentUser.rol==='Líder')document.getElementById('btnEquipo').style.display='block';
  getSheet('Usuarios',function(e,rows){allAgentes=(rows||[]).filter(function(r){return r.activo==='si';}).map(function(r){return r.nombre;});});
  showTab('dashboard',document.querySelector('.nav-btn'));
}

function doLogin(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value.trim();
  var err=document.getElementById('loginError');
  var btn=document.getElementById('loginBtn');
  err.classList.add('hidden');btn.textContent='Entrando...';btn.disabled=true;
  fetch(API+'?sheet=Usuarios').then(function(r){return r.json();}).then(function(rows){
    btn.textContent='Entrar';btn.disabled=false;
    var user=null;
    for(var i=0;i<rows.length;i++){if(rows[i].usuario===u&&rows[i].password===p){user=rows[i];break;}}
    if(user){
      currentUser={user:u,nombre:user.nombre,rol:user.rol,initials:user.nombre.split(' ').map(function(x){return x[0];}).join('').slice(0,2)};
      localStorage.setItem('crm_user',JSON.stringify(currentUser));
      mostrarApp();
    }else{err.textContent='Usuario o contraseña incorrectos';err.classList.remove('hidden');}
  }).catch(function(){btn.textContent='Entrar';btn.disabled=false;err.textContent='Error de conexión.';err.classList.remove('hidden');});
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogout(){
  currentUser=null;localStorage.removeItem('crm_user');
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
  document.getElementById('btnEquipo').style.display='none';
}
(function(){var saved=localStorage.getItem('crm_user');if(saved){try{currentUser=JSON.parse(saved);mostrarApp();}catch(e){localStorage.removeItem('crm_user');}}})();

function showTab(tab,btn){
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  loading();
  if(tab==='dashboard')loadDashboard();
  else if(tab==='propiedades')loadPropiedades();
  else if(tab==='busquedas')loadBusquedas();
  else if(tab==='desarrollos')loadDesarrollos();
  else if(tab==='finanzas')loadFinanzas();
  else if(tab==='objetivos')loadObjetivos();
  else if(tab==='equipo')loadEquipo();
}

// ============================================================
// DASHBOARD
// ============================================================
function loadDashboard(filtroAgente){
  var agente=filtroAgente||currentUser.nombre;
  var esLider=currentUser.rol==='Líder';
  Promise.all([
    fetch(API+'?sheet=Propiedades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Busquedas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Objetivos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Operaciones').then(function(r){return r.json();}),
    fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Reservas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Unidades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();})
  ]).then(function(res){
    var allProps=res[0]||[],allBusq=res[1]||[],fins=res[2]||[],objs=res[3]||[],allOpsDash=res[4]||[],allGastosDash=res[5]||[],reservas=res[6]||[],allUnis=res[7]||[],allDevsDash=res[8]||[];
    var ops=allOpsDash.filter(function(o){return o.agente===agente;});
    var gastos=allGastosDash.filter(function(g){return g.agente===agente;});

    var props=allProps.filter(function(p){return p.agente===agente&&!p.desarrollo_id;});
    var busqs=allBusq.filter(function(b){return b.agente===agente;});
    fins=fins.filter(function(f){return f.agente===agente;});
    gastos=gastos.filter(function(g){return g.agente===agente;});
    ops=ops.filter(function(o){return o.agente===agente;});
    reservas=reservas.filter(function(r){return r.agente===agente;});
    var devIds=allDevsDash.filter(function(d){return d.agente===agente;}).map(function(d){return d.id;});
    var unis=allUnis.filter(function(u){return devIds.indexOf(u.desarrollo_id)>=0;});

    // Combinar props sueltas + búsquedas para stock
    var todasProps=props.concat(busqs);
    var enVenta=todasProps.filter(function(p){return p.estado==='En venta';}).length+unis.filter(function(u){return u.condicion==='Activa';}).length;
    var reservadas=todasProps.filter(function(p){return p.estado==='Reservada';}).length+unis.filter(function(u){return u.condicion==='Reservada';}).length;
    var vendidas=todasProps.filter(function(p){return p.estado==='Vendida';}).length+unis.filter(function(u){return u.condicion==='Vendida';}).length;

    var gastosOficina=fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosProp=gastos.reduce(function(a,g){return a+Number(g.monto||0);},0);

    // Facturación bruta = comision_total de operaciones cerradas
    var facturacionBruta=ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    // Facturación neta
    var facturacion=ops.reduce(function(a,o){
      if(esLider&&agente===currentUser.nombre)return a+Number(o.neto_team_leader||o.neto_agente||o.comision_total||0);
      return a+Number(o.neto_agente||o.comision_total||0);
    },0);
    var rentabilidad=facturacion-gastosProp-gastosOficina;

    // Com proyectada propia
    var comReservas=reservas.reduce(function(a,r){return a+Number(r.precio_reserva||0)*(Number(r.comision_compradora||0)+Number(r.comision_vendedora||0))/100;},0)
      +unis.filter(function(u){return u.condicion==='Reservada';}).reduce(function(a,u){return a+Number(u.comision||0);},0);
    var comStock=todasProps.filter(function(p){return p.estado==='En venta';}).reduce(function(a,p){return a+Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},0)
      +unis.filter(function(u){return u.condicion==='Activa';}).reduce(function(a,u){return a+Number(u.comision||0);},0);

    var html='';

    if(esLider){
      html+='<div class="agente-selector"><span style="font-size:12px;color:#888;font-weight:500">Ver datos de:</span>';
      allAgentes.forEach(function(a){html+='<div class="agente-chip'+(a===agente?' active':'')+'" onclick="loadDashboard(\''+esc(a)+'\')">'+chipLabel(a)+'</div>';});
      html+='</div>';

      // Widget del team (siempre visible para el líder)
      if(agente===currentUser.nombre){
        // Bloque 1: Team + TL — stock proyectado
        var ttlPrBruta=0,ttlPrNeta=0,ttlResBruta=0,ttlResNeta=0;
        // Bloque 2: Solo agentes — stock proyectado
        var agPrBruta=0,agPrNeta=0,agResBruta=0,agResNeta=0;
        // Bloque 3: Operaciones cerradas
        var opsTtlBruta=0,opsTtlNeta=0; // Team+TL
        var opsAgBruta=0,opsAgNeta=0;   // Solo agentes
        var gastosTeamUSD=0;

        allAgentes.forEach(function(ag){
          var esLiderAg=ag===currentUser.nombre;
          var agProps=allProps.filter(function(p){return p.agente===ag&&!p.desarrollo_id;});
          var agBusqs=allBusq.filter(function(b){return b.agente===ag;});
          var agDevIds2=allDevsDash.filter(function(d){return d.agente===ag;}).map(function(d){return d.id;});
          var agUnis=allUnis.filter(function(u){return agDevIds2.indexOf(u.desarrollo_id)>=0;});
          var agTodas=agProps.concat(agBusqs);

          // Gastos de agentes
          if(!esLiderAg){
            gastosTeamUSD+=allGastosDash.filter(function(g){return g.agente===ag&&(g.moneda||'USD')==='USD';}).reduce(function(a,g){return a+Number(g.monto||0);},0);
          }
          // Operaciones cerradas
          var agOps=allOpsDash.filter(function(o){return o.agente===ag;});
          agOps.forEach(function(o){
            var bruta=Number(o.comision_total||0);
            var neta=esLiderAg
              ?Number(o.neto_team_leader||0)
              :Number(o.comision_team_leader||0)-Number(o.martillero||0);
            opsTtlBruta+=bruta; opsTtlNeta+=neta;
            if(!esLiderAg){opsAgBruta+=bruta; opsAgNeta+=neta;}
          });

          function calcStock(items,getPrecio,isActiva){
            items.forEach(function(item){
              var comBruta=getPrecio(item);
              var netoTL=esLiderAg
                ?(comBruta*0.80-comBruta*0.80*0.04)
                :(comBruta*getDistrib(item.referido).tl/100 - comBruta*0.80*0.04);
              if(isActiva){
                ttlPrBruta+=comBruta; ttlPrNeta+=netoTL;
                if(!esLiderAg){agPrBruta+=comBruta; agPrNeta+=netoTL;}
              }else{
                ttlResBruta+=comBruta; ttlResNeta+=netoTL;
                if(!esLiderAg){agResBruta+=comBruta; agResNeta+=netoTL;}
              }
            });
          }

          calcStock(
            agTodas.filter(function(p){return p.estado==='En venta';}),
            function(p){return Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},
            true
          );
          calcStock(
            agUnis.filter(function(u){return u.condicion==='Activa';}),
            function(u){return Number(u.comision||0);},
            true
          );
          calcStock(
            agTodas.filter(function(p){return p.estado==='Reservada';}),
            function(p){return Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},
            false
          );
          calcStock(
            agUnis.filter(function(u){return u.condicion==='Reservada';}),
            function(u){return Number(u.comision||0);},
            false
          );
        });

        var rentTeam=opsAgNeta-gastosTeamUSD;
        var rentTeamPct=opsAgBruta>0?Math.round(rentTeam/opsAgBruta*100):0;
        var sep='<div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;border-top:1px solid rgba(255,255,255,0.2);padding-top:12px">';

        html+='<div class="team-widget" style="cursor:pointer" onclick="abrirPanelTeam()">'
          +'<div class="team-widget-title">Team Olivera</div>'

          // Bloque 1: Team + TL — Stock proyectado
          +'<div style="font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:4px">Team + Team Leader · Stock proyectado</div>'
          +'<div class="team-metrics" style="margin-bottom:1rem">'
          +'<div class="team-metric"><div class="team-metric-label">Bruta activo</div><div class="team-metric-value">USD '+fmt(Math.round(ttlPrBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Neta para mí</div><div class="team-metric-value">USD '+fmt(Math.round(ttlPrNeta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Bruta reservas</div><div class="team-metric-value">USD '+fmt(Math.round(ttlResBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Neta reservas</div><div class="team-metric-value">USD '+fmt(Math.round(ttlResNeta))+'</div></div>'
          +'</div>'

          // Bloque 2: Operaciones cerradas
          +sep+'Operaciones cerradas</div>'
          +'<div class="team-metrics" style="margin-bottom:1rem">'
          +'<div class="team-metric"><div class="team-metric-label">Team+TL · Bruta</div><div class="team-metric-value">USD '+fmt(Math.round(opsTtlBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Team+TL · Neta para mí</div><div class="team-metric-value">USD '+fmt(Math.round(opsTtlNeta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Solo Team · Bruta</div><div class="team-metric-value">USD '+fmt(Math.round(opsAgBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Solo Team · Neta para mí</div><div class="team-metric-value">USD '+fmt(Math.round(opsAgNeta))+'</div></div>'
          +'</div>'

          // Bloque 3: Solo Team
          +sep+'Solo Team</div>'
          +'<div class="team-metrics">'
          +'<div class="team-metric"><div class="team-metric-label">Bruta stock</div><div class="team-metric-value">USD '+fmt(Math.round(agPrBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Neta para mí</div><div class="team-metric-value">USD '+fmt(Math.round(agPrNeta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Bruta reservas</div><div class="team-metric-value">USD '+fmt(Math.round(agResBruta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Neta reservas</div><div class="team-metric-value">USD '+fmt(Math.round(agResNeta))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Gastos s/ agentes</div><div class="team-metric-value" style="color:#fca5a5">USD '+fmt(Math.round(gastosTeamUSD))+'</div></div>'
          +'<div class="team-metric"><div class="team-metric-label">Rentabilidad</div>'
          +'<div class="team-metric-value" style="color:'+(rentTeamPct>=50?'#6ee7b7':'#fca5a5')+'">USD '+fmt(Math.round(rentTeam))+'</div>'
          +(opsAgBruta>0?'<div style="font-size:11px;margin-top:3px;font-weight:600;color:'+(rentTeamPct>=50?'#6ee7b7':'#fca5a5')+'">'+rentTeamPct+'%</div>':'')
          +'</div>'
          +'</div></div>';
      }
    }

    // ---- AÑO CALENDARIO ----
    var anoActual=new Date().getFullYear();
    var opsAno=ops.filter(function(o){return o.fecha&&o.fecha.startsWith(String(anoActual));});
    var facturacionBrutaAno=opsAno.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var facturacionNetaAno=opsAno.reduce(function(a,o){
      if(esLider&&agente===currentUser.nombre)return a+Number(o.neto_team_leader||o.neto_agente||0);
      return a+Number(o.neto_agente||0);
    },0);
    var gastosAno=gastos.reduce(function(a,g){return a+Number(g.monto||0);},0);
    var gastosOficinaAno=fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var totalGastos=gastosAno+gastosOficinaAno;
    var rentabilidadAno=facturacionNetaAno-totalGastos;
    var rentPctAno=facturacionBrutaAno>0?Math.round(rentabilidadAno/facturacionBrutaAno*100):0;

    // Ticket promedio: precio_final promedio de ops cerradas del año
    // Si no hay ops, se estima por precio promedio del stock en venta
    var ticketPromedio=opsAno.length>0
      ?Math.round(opsAno.reduce(function(a,o){return a+Number(o.precio_final||0);},0)/opsAno.length)
      :(function(){
          var precios=todasProps.filter(function(p){return p.estado==='En venta';})
            .map(function(p){return Number(p.precio||0);})
            .concat(unis.filter(function(u){return u.condicion==='Activa';}).map(function(u){return Number(u.precio||0);}));
          return precios.length>0?Math.round(precios.reduce(function(a,v){return a+v;},0)/precios.length):0;
        })();
    // Comisión promedio: comision_total promedio de ops cerradas del año
    // Si no hay ops, se estima por comisión promedio del stock en venta
    var comisionPromedio=opsAno.length>0
      ?Math.round(facturacionBrutaAno/opsAno.length)
      :(function(){
          var coms=todasProps.filter(function(p){return p.estado==='En venta';})
            .map(function(p){return Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;})
            .concat(unis.filter(function(u){return u.condicion==='Activa';}).map(function(u){return Number(u.comision||0);}));
          return coms.length>0?Math.round(coms.reduce(function(a,v){return a+v;},0)/coms.length):0;
        })();

    // ---- OBJETIVO ANUAL ----
    var objAnual=objs.find(function(o){return (o.agente===agente||o.agente===currentUser.nombre)&&o.periodo==='Anual'&&o.unidad==='USD';});
    var metaAnual=objAnual?Number(objAnual.meta||0):0;
    var progAnual=metaAnual>0?Math.min(100,Math.round(facturacionBrutaAno/metaAnual*100)):0;

    // Cuatrimestre actual
    var mesActual=new Date().getMonth()+1;
    var cuatri=mesActual<=4?1:mesActual<=8?2:3;
    var pctCuatri=cuatri===1?0.25:cuatri===2?0.35:0.40;
    var metaCuatri=Math.round(metaAnual*pctCuatri);
    var opsEnCuatri=opsAno.filter(function(o){
      var m=parseInt((o.fecha||'').split('-')[1]||0);
      if(cuatri===1)return m>=1&&m<=4;
      if(cuatri===2)return m>=5&&m<=8;
      return m>=9&&m<=12;
    });
    var brutaCuatri=opsEnCuatri.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var progCuatri=metaCuatri>0?Math.min(100,Math.round(brutaCuatri/metaCuatri*100)):0;

    // ---- PROYECCIÓN ----
    var faltaBruta=Math.max(0,metaAnual-facturacionBrutaAno);
    var hoy=new Date();
    var finAno=new Date(anoActual,11,31);
    var mesesRestantes=Math.max(0.5,((finAno-hoy)/(1000*60*60*24*30.5)));
    var opsQueFaltan=ticketPromedio>0?faltaBruta/ticketPromedio:0;
    var stockNecesario=opsQueFaltan>0?(opsQueFaltan/mesesRestantes)/0.12:0;
    var propsMes=Math.ceil(stockNecesario);
    var busqMes=Math.ceil(opsQueFaltan/5/mesesRestantes);
    var propsTotales=Math.ceil(opsQueFaltan*4/5);
    var busqTotales=Math.ceil(opsQueFaltan/5);
    var cuatriNombre=cuatri===1?'1er cuatrimestre (ene-abr)':cuatri===2?'2do cuatrimestre (may-ago)':'3er cuatrimestre (sep-dic)';
    var nombreCorto=agente.split(' ')[0];

    // ---- RENDER ----
    // Título
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem">'
      +'<div><div style="font-size:24px;font-weight:800;color:#1a1a1a">Mi negocio</div>'
      +'<div style="font-size:13px;color:#888;margin-top:2px">'+nombreCorto+' · '+anoActual+'</div></div>'
      +(metaAnual>0?'<div style="text-align:right"><div style="font-size:28px;font-weight:800;color:'+(progAnual>=100?'#065f46':progAnual>=60?'#185FA5':'#92400e')+'">'+progAnual+'%</div><div style="font-size:12px;color:#888">del objetivo anual</div></div>':'')
      +'</div>';

    // Bloque 1: Resumen del año
    html+='<div class="section-divider" style="margin-top:0">Resumen del año</div>'
      +'<div class="grid-metrics">'
      +'<div class="metric"><div class="metric-label">Operaciones</div><div class="metric-value">'+opsAno.length+'</div></div>'
      +'<div class="metric"><div class="metric-label">Ticket promedio</div><div class="metric-value">'+( ticketPromedio>0?'USD '+fmt(ticketPromedio):'-')+'</div>'+(opsAno.length===0&&ticketPromedio>0?'<div style="font-size:11px;color:#aaa;margin-top:3px">Estimado por stock</div>':'')+'</div>'
      +'<div class="metric"><div class="metric-label">Comisión promedio</div><div class="metric-value green">'+( comisionPromedio>0?'USD '+fmt(comisionPromedio):'-')+'</div>'+(opsAno.length===0&&comisionPromedio>0?'<div style="font-size:11px;color:#aaa;margin-top:3px">Estimado por stock</div>':'')+'</div>'
      +'<div class="metric"><div class="metric-label">Facturación bruta</div><div class="metric-value blue">USD '+fmt(Math.round(facturacionBrutaAno))+'</div></div>'
      +'<div class="metric"><div class="metric-label">Facturación neta</div><div class="metric-value green">USD '+fmt(Math.round(facturacionNetaAno))+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos totales</div><div class="metric-value red">USD '+fmt(Math.round(totalGastos))+'</div></div>'
      +'<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value '+(rentabilidadAno>=0?'green':'red')+'">USD '+fmt(Math.round(rentabilidadAno))+'</div>'
      +(facturacionBrutaAno>0?'<div style="font-size:12px;color:#888;margin-top:4px">'+rentPctAno+'% sobre bruta</div>':'')+'</div>'
      +'</div>';

    // Bloque 2: Stock actual
    html+='<div class="section-divider">Stock actual</div>'
      +'<div class="grid-metrics">'
      +'<div class="metric"><div class="metric-label">En venta / Activas</div><div class="metric-value blue">'+enVenta+'</div></div>'
      +'<div class="metric"><div class="metric-label">Reservadas</div><div class="metric-value amber">'+reservadas+'</div></div>'
      +'<div class="metric"><div class="metric-label">Vendidas este año</div><div class="metric-value green">'+opsAno.length+'</div></div>'
      +'<div class="metric"><div class="metric-label">Com. proy. stock</div><div class="metric-value blue">USD '+fmt(Math.round(comStock))+'</div></div>'
      +'<div class="metric"><div class="metric-label">Com. proy. reservas</div><div class="metric-value amber">USD '+fmt(Math.round(comReservas))+'</div></div>'
      +'</div>';

    // Bloque 3: Objetivo
    if(metaAnual>0){
      html+='<div class="section-divider">Objetivo anual</div>'
        +'<div class="card">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">'
        +'<div><div style="font-size:15px;font-weight:700">Meta: USD '+fmt(metaAnual)+'</div>'
        +'<div style="font-size:12px;color:#888;margin-top:3px">'+cuatriNombre+' · Meta cuatrimestre: USD '+fmt(metaCuatri)+'</div></div>'
        +'<div style="text-align:right"><div style="font-size:13px;color:#888">Cuatrimestre</div><div style="font-size:20px;font-weight:800;color:'+progColor(progCuatri)+'">'+progCuatri+'%</div></div>'
        +'</div>'
        +'<div style="font-size:12px;color:#888;margin-bottom:4px">Anual — USD '+fmt(Math.round(facturacionBrutaAno))+' / USD '+fmt(metaAnual)+'</div>'
        +'<div class="progress-bar" style="height:12px;margin-bottom:1rem"><div class="progress-fill" style="width:'+progAnual+'%;background:'+progColor(progAnual)+'"></div></div>'
        +'<div style="font-size:12px;color:#888;margin-bottom:4px">'+cuatriNombre+' — USD '+fmt(Math.round(brutaCuatri))+' / USD '+fmt(metaCuatri)+'</div>'
        +'<div class="progress-bar" style="height:10px;margin-bottom:1.25rem"><div class="progress-fill" style="width:'+progCuatri+'%;background:'+progColor(progCuatri)+'"></div></div>'
        +(faltaBruta>0
          ?'<div style="background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e5e7eb">'
          +'<div style="font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">📋 Para cumplir el objetivo</div>'
          +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Falta generar</div><div style="font-size:16px;font-weight:700;color:#991b1b">USD '+fmt(Math.round(faltaBruta))+'</div></div>'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Ops. que faltan</div><div style="font-size:16px;font-weight:700">'+Math.ceil(opsQueFaltan)+'</div></div>'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Propiedades a captar</div><div style="font-size:18px;font-weight:700;color:#185FA5">'+propsTotales+'</div><div style="font-size:11px;color:#888">≈ '+propsMes+' / mes</div></div>'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Búsquedas a captar</div><div style="font-size:18px;font-weight:700;color:#5b21b6">'+busqTotales+'</div><div style="font-size:11px;color:#888">≈ '+busqMes+' / mes</div></div>'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Stock activo necesario</div><div style="font-size:18px;font-weight:700;color:#0f766e">'+Math.ceil(stockNecesario)+'</div><div style="font-size:11px;color:#888">rotación 12% / mes</div></div>'
          +'<div style="background:#fff;border-radius:8px;padding:10px;border:1px solid #eee"><div style="font-size:11px;color:#888">Meses restantes</div><div style="font-size:18px;font-weight:700">'+Math.ceil(mesesRestantes)+'</div></div>'
          +'</div></div>'
          :'<div style="text-align:center;padding:1rem;color:#065f46;font-weight:700;font-size:16px">🎉 ¡Objetivo cumplido!</div>'
        )+'</div>';
    }else{
      html+='<div class="section-divider">Objetivo anual</div>'
        +'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:1.25rem;margin-bottom:1rem;font-size:13px;color:#92400e">'
        +'💡 No hay objetivo anual cargado. Agregá uno en <strong>Objetivos</strong> con período <strong>Anual</strong> y unidad <strong>USD</strong>.</div>';
    }

    document.getElementById('tabContent').innerHTML=html;
    // Mini chart facturación por mes
    try{
      var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      var dataMeses=meses.map(function(m,i){return opsAno.filter(function(o){return parseInt((o.fecha||'').split('-')[1]||0)===i+1;}).reduce(function(a,o){return a+Number(o.comision_total||0);},0);});
      if(document.getElementById('chartMini')){
        new Chart(document.getElementById('chartMini'),{type:'bar',data:{labels:meses,datasets:[{data:dataMeses,backgroundColor:'rgba(24,95,165,0.7)',borderRadius:3}]},options:{responsive:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:8}}},y:{ticks:{font:{size:8},callback:function(v){return v>0?'$'+Math.round(v/1000)+'k':'';}}}}}});
      }
    }catch(e){}
  });
}

  d=d||{};
  var referidoHtml='';
  if(mostrarReferido){
    referidoHtml='<div class="form-group"><label>¿Referida por Gonzalo?</label>'
      +'<select id="f-referido">'
      +'<option value="no">No</option>'
      +'<option value="si">Sí — referida por el Team Leader</option>'
      +'</select></div>';
  }
  return '<div class="section-divider">Datos de la propiedad</div>'
    +'<div class="row"><div class="form-group"><label>Dirección</label><input id="f-dir" value="'+(d.direccion||'')+'" autocomplete="off"/></div>'
    +'<div class="form-group"><label>Localidad</label><input id="f-loc" value="'+(d.localidad||d.zona||'Villa Urquiza')+'" autocomplete="off"/></div></div>'
    +'<div class="row"><div class="form-group"><label>Tipo</label><select id="f-tipo"><option>Departamento</option><option>PH</option><option>Casa</option><option>Local</option><option>Oficina</option></select></div>'
    +'<div class="form-group"><label>Estado</label><select id="f-estado"><option>En venta</option><option>En alquiler</option><option>Reservada</option><option>Vendida</option><option>Alquilada</option></select></div></div>'
    +'<div class="form-group"><label>Valor de publicación (USD)</label><input id="f-precio" type="number" value="'+(d.precio||'')+'"/></div>'
    +referidoHtml
    +'<div class="section-divider">Cliente (vendedor)</div>'
    +'<div class="form-group"><label>Nombre</label><input id="f-cliente" value="'+(d.cliente||'')+'" autocomplete="off"/></div>'
    +'<div class="row"><div class="form-group"><label>Teléfono</label><input id="f-tel" value="'+(d.telefono||'')+'" autocomplete="off"/></div>'
    +'<div class="form-group"><label>Mail</label><input id="f-mail" type="email" value="'+(d.mail||'')+'" autocomplete="off"/></div></div>'
    +'<div class="section-divider">Comisiones</div>'
    +'<div class="row"><div class="form-group"><label>Com. comprador (%)</label><input id="f-comp" type="number" value="'+(d.comision_compradora||4)+'"/></div>'
    +'<div class="form-group"><label>Com. vendedor (%)</label><input id="f-vend" type="number" value="'+(d.comision_vendedora||3)+'"/></div></div>';

function setFormPropValues(d){

function getPropData(extra){
  var base={direccion:v('f-dir'),localidad:v('f-loc'),tipo:v('f-tipo'),estado:v('f-estado'),precio:v('f-precio'),cliente:v('f-cliente'),telefono:v('f-tel'),mail:v('f-mail'),comision_compradora:v('f-comp'),comision_vendedora:v('f-vend')};
  var refEl=document.getElementById('f-referido');
  if(refEl)base.referido=refEl.value;
  return Object.assign(base,extra||{});
}

function calcCierre(referido,esAgente){
  var c=Number(v('rc-cierre')||0);
  var comp=Number(v('rc-comp')||0),vend=Number(v('rc-vend')||0);
  var pctTL=Number(v('rc-pcttl')||0);
  var pctAg=esAgente?Number(v('rc-pctag')||0):0;
  var pctO=Number(v('rc-pcto')||0);
  var pctM=Number(v('rc-mart')||4);
  var ivaC=Number(v('rc-ivac')||0),ivaCm=v('rc-ivac-m')||'USD';
  var ivaV=Number(v('rc-ivav')||0),ivaVm=v('rc-ivav-m')||'USD';
  var ivaO=Number(v('rc-ivao')||0),ivaOm=v('rc-ivao-m')||'USD';
  var comTotal=c*(comp+vend)/100;
  var parteTL=comTotal*pctTL/100;
  var parteAg=esAgente?comTotal*pctAg/100:0;
  var parteO=comTotal*pctO/100;
  var martillero=parteTL*pctM/100;
  // IVA solo resta al TL si son USD
  var ivaTotalUSD=(ivaCm==='USD'?ivaC:0)+(ivaVm==='USD'?ivaV:0)+(ivaOm==='USD'?ivaO:0);
  var netoTL=parteTL-martillero-ivaTotalUSD;
  var el=document.getElementById('rc-preview');if(!el)return;
  el.innerHTML='<div class="distrib-box">'
    +'<div class="distrib-row"><span>Comisión total ('+comp+'%+'+vend+'%)</span><span style="font-weight:600">USD '+fmt(Math.round(comTotal))+'</span></div>'
    +(esAgente?'<div class="distrib-row"><span>Parte Agente ('+pctAg+'%)</span><span>USD '+fmt(Math.round(parteAg))+'</span></div>':'')
    +'<div class="distrib-row"><span>Parte Team Leader ('+pctTL+'%)</span><span>USD '+fmt(Math.round(parteTL))+'</span></div>'
    +'<div class="distrib-row"><span>Parte Oficina ('+pctO+'%)</span><span>USD '+fmt(Math.round(parteO))+'</span></div>'
    +'<div class="distrib-sep"></div>'
    +'<div class="distrib-row" style="color:#991b1b"><span>− Martillero ('+pctM+'% s/ TL)</span><span>USD '+fmt(Math.round(martillero))+'</span></div>'
    +'<div class="distrib-row" style="color:#991b1b"><span>− IVA comprador</span><span>'+ivaCm+' '+fmt(ivaC)+'</span></div>'
    +'<div class="distrib-row" style="color:#991b1b"><span>− IVA vendedor</span><span>'+ivaVm+' '+fmt(ivaV)+'</span></div>'
    +'<div class="distrib-row" style="color:#991b1b"><span>− IVA oficina</span><span>'+ivaOm+' '+fmt(ivaO)+'</span></div>'
    +'<div class="distrib-total"><span>🟢 Neto Team Leader</span><span>USD '+fmt(Math.round(netoTL))+'</span></div>'
    +'</div>';
}

function confirmarCierre(origen,sheet,id,referido,esAgente){
  var c=Number(v('rc-cierre')||0);
  var comp=Number(v('rc-comp')||0),vend=Number(v('rc-vend')||0);
  var pctTL=Number(v('rc-pcttl')||0);
  var pctAg=esAgente?Number(v('rc-pctag')||0):0;
  var pctO=Number(v('rc-pcto')||0);
  var pctM=Number(v('rc-mart')||4);
  var ivaC=Number(v('rc-ivac')||0),ivaCm=v('rc-ivac-m')||'USD';
  var ivaV=Number(v('rc-ivav')||0),ivaVm=v('rc-ivav-m')||'USD';
  var ivaO=Number(v('rc-ivao')||0),ivaOm=v('rc-ivao-m')||'USD';
  var fecha=v('rc-fecha'),estado=v('rc-estado');
  var comTotal=c*(comp+vend)/100;
  var parteTL=comTotal*pctTL/100;
  var parteAg=esAgente?comTotal*pctAg/100:0;
  var parteO=comTotal*pctO/100;
  var martillero=parteTL*pctM/100;
  var ivaTotalUSD=(ivaCm==='USD'?ivaC:0)+(ivaVm==='USD'?ivaV:0)+(ivaOm==='USD'?ivaO:0);
  var netoTL=parteTL-martillero-ivaTotalUSD;
  var netoAg=parteAg;
  closeModal();loading();

  var opData={id:uid(),fecha:fecha,referido:referido,precio_final:c,
    comision_total:Math.round(comTotal),
    comision_agente:Math.round(parteAg),
    comision_team_leader:Math.round(parteTL),
    parte_oficina:Math.round(parteO),
    martillero:Math.round(martillero),
    iva_comprador:ivaC,iva_comprador_moneda:ivaCm,
    iva_vendedor:ivaV,iva_vendedor_moneda:ivaVm,
    iva_oficina:ivaO,iva_oficina_moneda:ivaOm,
    neto_agente:Math.round(netoAg),
    neto_team_leader:Math.round(netoTL),
    agente:currentUser.nombre};

  function afterOp(){sheet==='Busquedas'?loadBusquedas():loadPropiedades();}

  if(origen==='prop'){
    opData.propiedad_id=id;
    updRow(sheet,id,{valor_cierre:c,estado:estado,comision_compradora:comp,comision_vendedora:vend},function(){
      addRow('Operaciones',opData,function(){
        if(estado==='Vendida'){
          getSheet('Reservas',function(e,reservas){
            var res=(reservas||[]).find(function(r){return r.propiedad_id===id;});
            if(res)delRow('Reservas',res.id,function(){});
            afterOp();
          });
        }else{
          addRow('Reservas',{id:uid(),fecha:fecha,propiedad_id:id,precio_reserva:c,comision_compradora:comp,comision_vendedora:vend,agente:currentUser.nombre},function(){afterOp();});
        }
      });
    });
  }else{
    opData.unidad_id=id;
    updRow('Unidades',id,{condicion:estado==='Vendida'?'Vendida':'Reservada'},function(){
      addRow('Operaciones',opData,function(){loadDesarrollos();});
    });
  }
}

function loadDesarrollos(){
  Promise.all([
    fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Unidades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();})
  ]).then(function(res){
    var devs=(res[0]||[]).filter(function(d){return d.agente===currentUser.nombre||currentUser.rol==='Líder';});
    var allUnis=res[1]||[];
    var html='<div class="section-header"><div class="section-title">Desarrollos</div><button class="btn btn-primary" onclick="abrirModalDesarrollo()">+ Nuevo desarrollo</button></div>';
    if(devs.length){
      devs.forEach(function(d){
        var unis=allUnis.filter(function(u){return u.desarrollo_id===d.id;});
        var activas=unis.filter(function(u){return u.condicion==='Activa';}).length;
        var reservadas=unis.filter(function(u){return u.condicion==='Reservada';}).length;
        var vendidas=unis.filter(function(u){return u.condicion==='Vendida';}).length;
        var comGen=unis.filter(function(u){return u.condicion==='Vendida';}).reduce(function(a,u){return a+Number(u.comision||0);},0);
        var comProy=unis.filter(function(u){return u.condicion==='Activa'||u.condicion==='Reservada';}).reduce(function(a,u){return a+Number(u.comision||0);},0);
        html+='<div class="dev-card" onclick="verFichaDesarrollo(\''+d.id+'\')">'
          +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
          +'<div><div style="font-weight:700;font-size:15px;color:#185FA5">🏢 '+d.nombre+'</div>'
          +'<div style="font-size:12px;color:#888;margin-top:3px">'+d.direccion+(d.localidad?' · '+d.localidad:'')+'</div>'
          +(d.cliente?'<div style="font-size:12px;color:#555;margin-top:4px">👤 '+d.cliente+(d.telefono?' · '+d.telefono:'')+'</div>':'')+'</div>'
          +'<div style="text-align:right">'
          +'<div style="font-size:22px;font-weight:700">'+unis.length+'<span style="font-size:12px;font-weight:400;color:#888"> uds.</span></div>'
          +'<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px">'
          +'<span class="badge badge-blue">'+activas+' act.</span><span class="badge badge-amber">'+reservadas+' res.</span><span class="badge badge-green">'+vendidas+' vend.</span>'
          +'</div>'
          +'<div style="font-size:12px;color:#065f46;font-weight:600;margin-top:6px">Generada: USD '+fmt(Math.round(comGen))+'</div>'
          +'<div style="font-size:12px;color:#92400e;font-weight:600;margin-top:2px">Proyectada: USD '+fmt(Math.round(comProy))+'</div>'
          +'</div></div>'
          +'<div style="display:flex;gap:6px;flex-wrap:wrap" onclick="event.stopPropagation()">'
          +'<button class="btn btn-sm btn-primary" onclick="verUnidades(\''+d.id+'\',\''+esc(d.nombre)+'\','+Number(d.comision_compradora||4)+','+Number(d.comision_vendedora||3)+')">Gestionar unidades</button>'
          +'<button class="btn btn-sm" onclick="abrirGastosDev(\''+d.id+'\',\''+esc(d.nombre)+'\')">+ Gasto</button>'
          +'<button class="btn btn-sm" style="color:#991b1b;border-color:#fecaca" onclick="eliminarDev(\''+d.id+'\')">Eliminar</button>'
          +'</div></div>';
      });
    }else{html+='<div class="empty">No hay desarrollos.</div>';}
    document.getElementById('tabContent').innerHTML=html;
  });
}

function verFichaDesarrollo(devId){
  Promise.all([fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();}),fetch(API+'?sheet=Unidades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();})]).then(function(res){
    var dev=(res[0]||[]).find(function(d){return d.id===devId;});if(!dev)return;
    var unis=(res[1]||[]).filter(function(u){return u.desarrollo_id===devId;});
    var act=unis.filter(function(u){return u.condicion==='Activa';});
    var res2=unis.filter(function(u){return u.condicion==='Reservada';});
    var vend=unis.filter(function(u){return u.condicion==='Vendida';});
    var comGen=vend.reduce(function(a,u){return a+Number(u.comision||0);},0);
    var comProy=act.concat(res2).reduce(function(a,u){return a+Number(u.comision||0);},0);
    var html='<div class="modal-header"><span class="modal-title">🏢 '+dev.nombre+'</span><button class="close-btn" onclick="closeModal()">×</button></div>';
    html+='<div class="section-divider">Datos</div>'
      +'<div class="ficha-row"><span class="ficha-label">Dirección</span><span class="ficha-value">'+dev.direccion+(dev.localidad?' · '+dev.localidad:'')+'</span></div>'
      +(dev.cliente?'<div class="ficha-row"><span class="ficha-label">Cliente</span><span class="ficha-value">'+dev.cliente+'</span></div>':'')
      +(dev.telefono?'<div class="ficha-row"><span class="ficha-label">Teléfono</span><span class="ficha-value">'+dev.telefono+'</span></div>':'');
    html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:1rem 0">'
      +'<div style="background:#eff6ff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#888;text-transform:uppercase">Activas</div><div style="font-size:22px;font-weight:700;color:#1e40af">'+act.length+'</div></div>'
      +'<div style="background:#fef3c7;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#888;text-transform:uppercase">Reservadas</div><div style="font-size:22px;font-weight:700;color:#92400e">'+res2.length+'</div></div>'
      +'<div style="background:#d1fae5;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#888;text-transform:uppercase">Vendidas</div><div style="font-size:22px;font-weight:700;color:#065f46">'+vend.length+'</div></div>'
      +'<div style="background:#f3f4f6;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#888;text-transform:uppercase">Total</div><div style="font-size:22px;font-weight:700">'+unis.length+'</div></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">'
      +'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px"><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px">Com. generada</div><div style="font-size:18px;font-weight:700;color:#065f46">USD '+fmt(Math.round(comGen))+'</div></div>'
      +'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px"><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px">Com. proyectada</div><div style="font-size:18px;font-weight:700;color:#92400e">USD '+fmt(Math.round(comProy))+'</div></div>'
      +'</div>';
    if(unis.length){
      html+='<div class="section-divider">Unidades</div><div class="table-wrap"><table><tr><th>Unidad</th><th>Precio</th><th>Comisión</th><th>Condición</th></tr>';
      unis.forEach(function(u){html+='<tr><td style="font-weight:600">'+u.nombre+'</td><td>USD '+fmt(u.precio)+'</td><td style="font-weight:600;color:'+(u.condicion==='Vendida'?'#065f46':'#92400e')+'">USD '+fmt(Math.round(Number(u.comision||0)))+'</td><td><span class="badge '+estadoBadge(u.condicion)+'">'+u.condicion+'</span></td></tr>';});
      html+='</table></div>';
    }
    html+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem"><button class="btn" onclick="closeModal()">Cerrar</button><button class="btn btn-primary" onclick="closeModal();verUnidades(\''+devId+'\',\''+esc(dev.nombre)+'\','+Number(dev.comision_compradora||4)+','+Number(dev.comision_vendedora||3)+')">Gestionar unidades →</button></div>';
    document.getElementById('modalBox').innerHTML=html;openModal();
  });
}

function abrirModalDesarrollo(){

    +'<div class="form-group"><label>Nombre</label><input id="dev-nombre" autocomplete="off"/></div>'
    +'<div class="row"><div class="form-group"><label>Dirección</label><input id="dev-dir" autocomplete="off"/></div><div class="form-group"><label>Localidad</label><input id="dev-loc" value="Villa Urquiza" autocomplete="off"/></div></div>'
    +'<div class="section-divider">Cliente (desarrollador)</div>'
    +'<div class="form-group"><label>Nombre</label><input id="dev-cliente" autocomplete="off"/></div>'
    +'<div class="row"><div class="form-group"><label>Teléfono</label><input id="dev-tel" autocomplete="off"/></div><div class="form-group"><label>Mail</label><input id="dev-mail" type="email" autocomplete="off"/></div></div>'
    +'<div class="section-divider">Comisiones</div>'
    +'<div class="row"><div class="form-group"><label>Com. comprador (%)</label><input id="dev-comp" type="number" value="4"/></div><div class="form-group"><label>Com. vendedor (%)</label><input id="dev-vend" type="number" value="3"/></div></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarDesarrollo()">Guardar</button></div>';

function guardarDesarrollo(){
  var data={id:uid(),nombre:v('dev-nombre'),direccion:v('dev-dir'),localidad:v('dev-loc'),cliente:v('dev-cliente'),telefono:v('dev-tel'),mail:v('dev-mail'),comision_compradora:v('dev-comp'),comision_vendedora:v('dev-vend'),agente:currentUser.nombre,fecha:today()};
  closeModal();loading();addRow('Desarrollos',data,function(){loadDesarrollos();});
}
function eliminarDev(id){if(!confirm('¿Eliminar?'))return;loading();delRow('Desarrollos',id,function(){loadDesarrollos();});}
function abrirGastosDev(devId,nombre){
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Gasto · '+nombre+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div class="form-group"><label>Concepto</label><input id="gd-concepto" autocomplete="off"/></div>'
    +'<div class="row"><div class="form-group"><label>Moneda</label><select id="gd-moneda"><option value="USD">USD</option><option value="ARS">ARS</option></select></div><div class="form-group"><label>Monto</label><input id="gd-monto" type="number"/></div></div>'
    +'<div class="form-group"><label>Fecha</label><input id="gd-fecha" type="date" value="'+today()+'"/></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarGastoDev(\''+devId+'\')">Guardar</button></div>';

}
function guardarGastoDev(devId){var data={id:uid(),fecha:v('gd-fecha'),propiedad_id:devId,concepto:v('gd-concepto'),monto:v('gd-monto'),moneda:v('gd-moneda'),agente:currentUser.nombre};closeModal();addRow('Gastos',data,function(){alert('Gasto registrado.');});}

function verUnidades(devId,devNombre,compPct,vendPct){
  compPct=Number(compPct||4);vendPct=Number(vendPct||3);
  getSheet('Unidades',function(e,unis){
    unis=(unis||[]).filter(function(u){return u.desarrollo_id===devId;});
    var vendidas=unis.filter(function(u){return u.condicion==='Vendida';}).length;
    var reservadas=unis.filter(function(u){return u.condicion==='Reservada';}).length;
    var activas=unis.filter(function(u){return u.condicion==='Activa';}).length;
    var comGen=unis.filter(function(u){return u.condicion==='Vendida';}).reduce(function(a,u){return a+Number(u.comision||0);},0);
    var comProy=unis.filter(function(u){return u.condicion==='Activa'||u.condicion==='Reservada';}).reduce(function(a,u){return a+Number(u.comision||0);},0);
    var html='<div class="section-header"><div><div class="section-title">'+devNombre+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:4px">'+unis.length+' uds · '+activas+' act. · '+reservadas+' res. · '+vendidas+' vend.</div>'
      +'<div style="display:flex;gap:12px;margin-top:6px"><span style="font-size:13px;color:#065f46;font-weight:600">Generada: USD '+fmt(Math.round(comGen))+'</span><span style="font-size:13px;color:#92400e;font-weight:600">Proyectada: USD '+fmt(Math.round(comProy))+'</span></div>'
      +'</div><div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="loadDesarrollos()">← Volver</button><button class="btn btn-sm btn-primary" onclick="abrirModalUnidad(\''+devId+'\',\''+esc(devNombre)+'\','+compPct+','+vendPct+')">+ Nueva unidad</button></div></div>';
    if(unis.length){
      html+='<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Unidad</th><th>Precio</th><th>Comisión</th><th>Referida</th><th>Agente</th><th>Condición</th><th></th></tr>';
      unis.forEach(function(u){
        var ref=u.referido||'no';
        html+='<tr><td style="font-weight:600">'+u.nombre+'</td><td>USD '+fmt(u.precio)+'</td>'
          +'<td style="font-weight:600;color:'+(u.condicion==='Vendida'?'#065f46':'#92400e')+'">USD '+fmt(Math.round(Number(u.comision||0)))+'</td>'
          +'<td>'+(ref==='si'?'<span class="referido-tag">✓ Ref.</span>':'<span class="no-referido-tag">No</span>')+'</td>'
          +'<td style="color:#888">'+(u.agente||'').split(' ').slice(-1)[0]+'</td>'
          +'<td><span class="badge '+estadoBadge(u.condicion)+'">'+u.condicion+'</span></td>'
          +'<td style="display:flex;gap:4px">'
          +'<button class="btn btn-sm btn-success" onclick="abrirCierre(\'unidad\',\'Unidades\',\''+u.id+'\',\''+esc(u.nombre)+'\','+Number(u.precio||0)+','+compPct+','+vendPct+',\''+ref+'\')">Cerrar</button>'
          +'<button class="btn btn-sm" onclick="cambiarCondUnidad(\''+u.id+'\',\''+devId+'\',\''+esc(devNombre)+'\','+compPct+','+vendPct+')">Estado</button>'
          +'<button class="btn btn-sm" style="color:#991b1b;border-color:#fecaca" onclick="eliminarUnidad(\''+u.id+'\',\''+devId+'\',\''+esc(devNombre)+'\','+compPct+','+vendPct+')">×</button>'
          +'</td></tr>';
      });
      html+='</table></div></div>';
    }else{html+='<div class="empty">No hay unidades.</div>';}
    document.getElementById('tabContent').innerHTML=html;
  });
}

function abrirModalUnidad(devId,devNombre,compPct,vendPct){
  compPct=Number(compPct||4);vendPct=Number(vendPct||3);
  var agentesOpts=allAgentes.map(function(a){return '<option>'+a+'</option>';}).join('');
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Nueva unidad · '+devNombre+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div class="row"><div class="form-group"><label>Nombre/Número</label><input id="u-nombre" autocomplete="off" placeholder="Ej: 1A, PB2"/></div>'
    +'<div class="form-group"><label>Condición</label><select id="u-cond"><option>Activa</option><option>Reservada</option><option>Vendida</option><option>Cancelada</option></select></div></div>'
    +'<div class="form-group"><label>Precio de venta (USD)</label><input id="u-precio" type="number" oninput="calcComUnidad('+compPct+','+vendPct+')"/></div>'
    +'<div id="u-preview" style="background:#f0f9ff;border-radius:8px;padding:12px;margin:0.5rem 0;font-size:13px;display:none"></div>'
    +'<div class="form-group"><label>Comisión proyectada (USD)</label><input id="u-comision" type="number"/></div>'
    +'<div class="form-group"><label>¿Referida por Gonzalo?</label><select id="u-referido"><option value="no">No</option><option value="si">Sí</option></select></div>'
    +'<div class="form-group"><label>Agente asignado</label><select id="u-agente">'+agentesOpts+'</select></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarUnidad(\''+devId+'\',\''+esc(devNombre)+'\','+compPct+','+vendPct+')">Guardar</button></div>';
  openModal();
}
function calcComUnidad(cp,vp){
  var precio=Number(document.getElementById('u-precio').value||0);
  var comp=precio*cp/100,vend=precio*vp/100,total=comp+vend;
  document.getElementById('u-comision').value=Math.round(total);
  var pr=document.getElementById('u-preview');pr.style.display='block';
  pr.innerHTML='<strong>Com. comprador ('+cp+'%):</strong> USD '+fmt(Math.round(comp))+'<br><strong>Com. vendedor ('+vp+'%):</strong> USD '+fmt(Math.round(vend))+'<br><strong style="color:#065f46">Total: USD '+fmt(Math.round(total))+'</strong>';
}
function guardarUnidad(devId,devNombre,compPct,vendPct){
  var data={id:uid(),desarrollo_id:devId,nombre:v('u-nombre'),precio:v('u-precio'),comision:v('u-comision'),condicion:v('u-cond'),referido:v('u-referido'),agente:v('u-agente'),fecha:today()};
  closeModal();loading();addRow('Unidades',data,function(){verUnidades(devId,devNombre,compPct,vendPct);});
}
function cambiarCondUnidad(id,devId,devNombre,compPct,vendPct){
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Cambiar condición</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div class="form-group"><label>Nueva condición</label><select id="u-cond-new"><option>Activa</option><option>Reservada</option><option>Vendida</option><option>Cancelada</option></select></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarCondUnidad(\''+id+'\',\''+devId+'\',\''+esc(devNombre)+'\','+compPct+','+vendPct+')">Guardar</button></div>';
  openModal();
}
function guardarCondUnidad(id,devId,devNombre,compPct,vendPct){var c=v('u-cond-new');closeModal();loading();updRow('Unidades',id,{condicion:c},function(){verUnidades(devId,devNombre,compPct,vendPct);});}
function eliminarUnidad(id,devId,devNombre,compPct,vendPct){if(!confirm('¿Eliminar?'))return;loading();delRow('Unidades',id,function(){verUnidades(devId,devNombre,compPct,vendPct);});}

function loadFinanzas(){
  Promise.all([
    fetch(API+'?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Operaciones').then(function(r){return r.json();})
  ]).then(function(res){
    var esLider=currentUser.rol==='Líder';
    var fins=(res[0]||[]).filter(function(f){return f.agente===currentUser.nombre;});
    var gastos=(res[1]||[]).filter(function(g){return g.agente===currentUser.nombre;});
    var ops=(res[2]||[]).filter(function(o){return o.agente===currentUser.nombre;});
    var gastosOficina=fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosPropUSD=gastos.filter(function(g){return(g.moneda||'USD')==='USD';}).reduce(function(a,g){return a+Number(g.monto||0);},0);
    var gastosPropARS=gastos.filter(function(g){return g.moneda==='ARS';}).reduce(function(a,g){return a+Number(g.monto||0);},0);
    var facturacion=ops.reduce(function(a,o){
      if(esLider)return a+Number(o.neto_team_leader||o.neto_agente||o.comision_total||0);
      return a+Number(o.neto_agente||o.comision_total||0);
    },0);
    var rentabilidad=facturacion-gastosPropUSD-gastosOficina;
    var html='<div class="grid-metrics">'
      +'<div class="metric"><div class="metric-label">Facturación neta</div><div class="metric-value green">USD '+fmt(Math.round(facturacion))+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos prop. USD</div><div class="metric-value red">USD '+fmt(gastosPropUSD)+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos prop. ARS</div><div class="metric-value red">$ '+fmt(gastosPropARS)+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos oficina</div><div class="metric-value red">USD '+fmt(gastosOficina)+'</div></div>'
      +'<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value '+(rentabilidad>=0?'green':'red')+'">USD '+fmt(Math.round(rentabilidad))+'</div></div>'
      +'</div>';
    html+='<div class="section-header" style="margin-top:1rem"><div class="section-title">Operaciones cerradas</div></div>';
    if(ops.length){
      html+='<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Fecha</th><th>Ref.</th><th>Com. total</th>'
        +(esLider?'<th>Com. TL</th>':'<th>Com. Agente</th>')
        +'<th>Martillero</th><th>IVA</th><th>Neto</th></tr>';
      ops.forEach(function(o){
        html+='<tr><td>'+o.fecha+'</td>'
          +'<td>'+(o.referido==='si'?'<span class="referido-tag">Ref.</span>':'<span class="no-referido-tag">—</span>')+'</td>'
          +'<td>USD '+fmt(Math.round(Number(o.comision_total||0)))+'</td>'
          +(esLider?'<td>USD '+fmt(Math.round(Number(o.comision_team_leader||0)))+'</td>':'<td>USD '+fmt(Math.round(Number(o.comision_agente||0)))+'</td>')
          +'<td style="color:#991b1b">−USD '+fmt(Math.round(Number(o.martillero||0)))+'</td>'
          +'<td style="color:#991b1b">−'+(o.iva_comprador_moneda||'USD')+' '+fmt(Math.round(Number(o.iva_comprador||0)+Number(o.iva_vendedor||0)+Number(o.iva_oficina||0)))+'</td>'
          +'<td style="font-weight:700;color:#065f46">USD '+fmt(Math.round(Number(esLider?(o.neto_team_leader||0):(o.neto_agente||0))))+'</td></tr>';
      });
      html+='</table></div></div>';
    }else{html+='<div class="empty">No hay operaciones cerradas.</div>';}

        else{html+='<div class="empty">Sin gastos.</div>';}
        html+='</div>';
        html+='<div class="cc-section"><div class="cc-section-title"><span>💳 Cuenta corriente · '+agenteActual.split(' ')[0]+' debe rendir</span><span style="font-weight:700;color:'+(totalCC>0?'#991b1b':'#065f46')+'">USD '+fmt(Math.round(totalCC))+'</span></div>';
        if(ccDeuda.length){html+='<div class="table-wrap"><table><tr><th>Fecha</th><th>Concepto</th><th>Monto</th><th>Nota</th><th></th></tr>';ccDeuda.forEach(function(r){html+='<tr><td>'+r.fecha+'</td><td>'+r.concepto+'</td><td style="color:#991b1b;font-weight:600">USD '+fmt(r.monto)+'</td><td style="color:#888">'+(r.nota||'-')+'</td><td><button class="btn btn-sm" onclick="window._elimCC(\''+r.id+'\')">×</button></td></tr>';});html+='</table></div>';}
        else{html+='<div class="empty">Sin cargos.</div>';}
        html+='</div>';
      }

      document.getElementById('tabContent').innerHTML=html;
      window._eq=function(vista,ag){render(vista,ag);};
      window._nuevoCC=function(tipo,ag){
        document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">'+(tipo==='gasto_gonzalo'?'Mi gasto sobre ':'Cargo cuenta corriente · ')+ag.split(' ')[0]+'</span><button class="close-btn" onclick="closeModal()">×</button></div>'
          +'<div class="row"><div class="form-group"><label>Fecha</label><input id="cc-fecha" type="date" value="'+today()+'"/></div><div class="form-group"><label>Monto (USD)</label><input id="cc-monto" type="number"/></div></div>'
          +'<div class="form-group"><label>Concepto</label><input id="cc-concepto" autocomplete="off"/></div>'
          +(tipo==='cuenta_corriente'?'<div class="form-group"><label>Nota (opcional)</label><input id="cc-nota" autocomplete="off"/></div>':'<div id="cc-nota" style="display:none"></div>')
          +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="window._guardarCC(\''+tipo+'\',\''+esc(ag)+'\')">Guardar</button></div>';
        openModal();
      };
      window._guardarCC=function(tipo,ag){
        var data={id:uid(),fecha:v('cc-fecha'),agente:ag,concepto:v('cc-concepto'),monto:v('cc-monto'),moneda:'USD',tipo:tipo,visible_agente:tipo==='cuenta_corriente'?'si':'no',nota:v('cc-nota')||''};
        closeModal();addRow('CuentaCorriente',data,function(){render('cuentas',ag);});
      };
      window._elimCC=function(id){if(!confirm('¿Eliminar?'))return;delRow('CuentaCorriente',id,function(){render('cuentas',agenteActual);});};
    });
  }
  render('consolidado','');
  window._eq=function(vista,ag){render(vista,ag);};
}

// ============================================================
// PANEL TEAM — click en widget
// ============================================================
function abrirPanelTeam(){
  Promise.all([
    fetch(API+'?sheet=Propiedades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Busquedas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Operaciones').then(function(r){return r.json();}),
    fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Desarrollos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Unidades').then(function(r){return r.json();})
  ]).then(function(res){
    var allProps=res[0]||[],allBusq=res[1]||[],allOps=res[2]||[],allGastos=res[3]||[],allDevs=res[4]||[],allUnis=res[5]||[];
    var anoActual=new Date().getFullYear();
    var agentes=allAgentes.filter(function(a){return a!==currentUser.nombre;});

    var html='<div class="modal-header"><span class="modal-title">Team Olivera · Detalle por agente</span><button class="close-btn" onclick="closeModal()">×</button></div>';
    html+='<div class="table-wrap"><table>'
      +'<tr>'
      +'<th>Agente</th>'
      +'<th>Captaciones</th>'
      +'<th>Reservas activas</th>'
      +'<th>Com. proy. reservas</th>'
      +'<th>Ops. '+anoActual+'</th>'
      +'<th>Fact. bruta</th>'
      +'<th>Rent. neta</th>'
      +'</tr>';

    agentes.forEach(function(ag){
      var agProps=allProps.filter(function(p){return p.agente===ag&&!p.desarrollo_id;});
      var agBusqs=allBusq.filter(function(b){return b.agente===ag;});
      var agDevIds=allDevs.filter(function(d){return d.agente===ag;}).map(function(d){return d.id;});
      var agUnis=allUnis.filter(function(u){return agDevIds.indexOf(u.desarrollo_id)>=0;});
      var agOps=allOps.filter(function(o){return o.agente===ag&&o.fecha&&o.fecha.startsWith(String(anoActual));});
      var agGastos=allGastos.filter(function(g){return g.agente===ag&&(g.moneda||'USD')==='USD';}).reduce(function(a,g){return a+Number(g.monto||0);},0);

      // Captaciones: propiedades sueltas (sin búsquedas)
      var captaciones=agProps.length+agUnis.length;

      // Reservas activas: props reservadas + búsquedas reservadas + unidades reservadas
      var propsReservadas=agProps.filter(function(p){return p.estado==='Reservada';}).length;
      var busqReservadas=agBusqs.filter(function(b){return b.estado==='Reservada';}).length;
      var unisReservadas=agUnis.filter(function(u){return u.condicion==='Reservada';}).length;
      var totalReservas=propsReservadas+busqReservadas+unisReservadas;

      // Comisión proyectada reservas: props + búsquedas + unidades reservadas
      var comPrReservas=agProps.filter(function(p){return p.estado==='Reservada';})
        .reduce(function(a,p){return a+Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},0)
        +agBusqs.filter(function(b){return b.estado==='Reservada';})
        .reduce(function(a,b){return a+Number(b.precio||0)*(Number(b.comision_compradora||0)+Number(b.comision_vendedora||0))/100;},0)
        +agUnis.filter(function(u){return u.condicion==='Reservada';})
        .reduce(function(a,u){return a+Number(u.comision||0);},0);

      // Facturación bruta año
      var brutaAno=agOps.reduce(function(a,o){return a+Number(o.comision_total||0);},0);

      // Neta para mí (TL) de operaciones cerradas
      var netaTL=agOps.reduce(function(a,o){return a+Number(o.comision_team_leader||0)-Number(o.martillero||0);},0);

      // Rentabilidad = (neta TL - gastos) / bruta * 100
      var rentNeta=netaTL-agGastos;
      var rentPct=brutaAno>0?Math.round(rentNeta/brutaAno*100):null;
      var rentColor=rentPct===null?'#888':rentPct>=50?'#065f46':'#991b1b';

      html+='<tr>'
        +'<td style="font-weight:600">'+ag.split(' ').slice(0,2).join(' ')+'</td>'
        +'<td style="text-align:center">'+captaciones+'</td>'
        +'<td style="text-align:center">'+totalReservas+'</td>'
        +'<td style="color:#92400e;font-weight:600">USD '+fmt(Math.round(comPrReservas))+'</td>'
        +'<td style="text-align:center">'+agOps.length+'</td>'
        +'<td style="font-weight:600;color:#185FA5">USD '+fmt(Math.round(brutaAno))+'</td>'
        +'<td style="font-weight:700;color:'+rentColor+'">'+(rentPct!==null?rentPct+'%':'—')+'</td>'
        +'</tr>';
    });

    html+='</table></div>';
    document.getElementById('modalBox').innerHTML=html;
    openModal();
  });
}
</script>
