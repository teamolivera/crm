<!DOCTYPE html>
<!-- v5 -->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Olivera CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}
    .hidden{display:none}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#185FA5,#0C447C)}
    .login-box{background:#fff;border-radius:16px;padding:2.5rem;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
    .login-box h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#185FA5}
    .login-box p{font-size:13px;color:#666;margin-bottom:1.5rem}
    .alert{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a}
    .form-group textarea{resize:vertical}
    .row{display:flex;gap:10px}
    .row .form-group{flex:1}
    .btn{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-weight:500}
    .btn:hover{background:#f5f5f5}
    .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn-primary:hover{background:#0C447C}
    .btn-success{background:#065f46;color:#fff;border-color:#065f46}
    .btn-success:hover{background:#044232}
    .btn-warning{background:#92400e;color:#fff;border-color:#92400e}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-full{width:100%;padding:12px;font-size:15px}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .topbar-logo{font-size:16px;font-weight:700;color:#185FA5}
    .topbar-logo span{color:#1a1a1a;font-weight:400}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .rol-badge{font-size:11px;background:#EFF6FF;color:#185FA5;padding:2px 8px;border-radius:20px;font-weight:500}
    .nav{display:flex;gap:4px;padding:10px 24px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
    .nav-btn{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
    .nav-btn.active{background:#EFF6FF;color:#185FA5}
    .content{padding:24px;max-width:1100px;margin:0 auto}
    .grid-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:1.5rem}
    .metric{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .metric-label{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
    .metric-value{font-size:22px;font-weight:700}
    .metric-value.green{color:#065f46}
    .metric-value.red{color:#991b1b}
    .metric-value.blue{color:#1e40af}
    .metric-value.amber{color:#92400e}
    .card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .card-title{font-size:15px;font-weight:600}
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:1.5rem}
    .chart-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .chart-title{font-size:13px;font-weight:600;color:#555;margin-bottom:1rem}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;color:#888;font-weight:500;border-bottom:1px solid #eee;font-size:12px;text-transform:uppercase;letter-spacing:0.3px}
    td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-amber{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}
    .progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-top:8px}
    .progress-fill{height:8px;border-radius:4px;transition:width 0.3s}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .modal{background:#fff;border-radius:16px;padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .modal-title{font-size:16px;font-weight:600}
    .close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1}
    .loading{text-align:center;padding:3rem;color:#888;font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .section-title{font-size:18px;font-weight:700}
    .prop-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .prop-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
    .obj-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem}
    .obj-actions{display:flex;gap:6px;margin-top:12px}
    .empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
    .section-divider{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:1rem 0 0.5rem;border-bottom:1px solid #eee;padding-bottom:6px}
    .tabs-secondary{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
    .tab-sec{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;font-weight:500;color:#666}
    .tab-sec.active{background:#185FA5;color:#fff;border-color:#185FA5}
    .agente-selector{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
    .agente-chip{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;font-weight:500;color:#666}
    .agente-chip.active{background:#185FA5;color:#fff;border-color:#185FA5}
    .dev-card{background:#fff;border-radius:12px;border:2px solid #dbeafe;padding:1.25rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .unidad-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
    .unidad-row:last-child{border-bottom:none}
  </style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h1>Team Olivera</h1>
    <p>CRM Inmobiliario · teamolivera.com</p>
    <div id="loginError" class="alert hidden">Usuario o contraseña incorrectos</div>
    <form autocomplete="off" onsubmit="return false">
      <input type="text" style="display:none" /><input type="password" style="display:none" />
      <div class="form-group"><label>Usuario</label><input id="loginUser" type="text" placeholder="golivera / gquintana" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" /></div>
      <div class="form-group"><label>Contraseña</label><input id="loginPass" type="password" placeholder="••••••" autocomplete="new-password" /></div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Entrar</button>
    </form>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="topbar">
    <div class="topbar-logo">Team Olivera <span>CRM</span></div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#555">
        <div class="avatar" id="avatarTop">GO</div>
        <div>
          <div style="font-weight:600;font-size:13px" id="userNameTop"></div>
          <div class="rol-badge" id="userRolTop"></div>
        </div>
      </div>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="nav" id="mainNav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showTab('propiedades',this)">Propiedades</button>
    <button class="nav-btn" onclick="showTab('desarrollos',this)">Desarrollos</button>
    <button class="nav-btn" onclick="showTab('finanzas',this)">Finanzas</button>
    <button class="nav-btn" onclick="showTab('objetivos',this)">Objetivos</button>
    <button class="nav-btn" id="btnEquipo" style="display:none" onclick="showTab('equipo',this)">Panel Equipo</button>
  </div>
  <div class="content" id="tabContent"></div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
var API = 'https://sheetdb.io/api/v1/8al8hyqbj13qm';
var currentUser = null;
var allAgentes = [];

function getSheet(sheet, cb) {
  fetch(API + '?sheet=' + sheet).then(function(r){return r.json();}).then(function(d){cb(null,d);}).catch(function(e){cb(e,null);});
}
function addRow(sheet, data, cb) {
  fetch(API + '?sheet=' + sheet, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[data]})}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});
}
function delRow(sheet, id, cb) {
  fetch(API+'/id/'+id+'?sheet='+sheet,{method:'DELETE'}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});
}
function updRow(sheet, id, data, cb) {
  fetch(API+'/id/'+id+'?sheet='+sheet,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:data})}).then(function(r){return r.json();}).then(function(d){if(cb)cb(null,d);}).catch(function(e){if(cb)cb(e,null);});
}

function mostrarApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('avatarTop').textContent = currentUser.initials;
  document.getElementById('userNameTop').textContent = currentUser.nombre;
  document.getElementById('userRolTop').textContent = currentUser.rol;
  if (currentUser.rol === 'Líder') {
    document.getElementById('btnEquipo').style.display = 'block';
  }
  cargarAgentes();
  showTab('dashboard', document.querySelector('.nav-btn'));
}

function cargarAgentes() {
  getSheet('Usuarios', function(e, rows) {
    allAgentes = (rows||[]).filter(function(r){return r.activo==='si';}).map(function(r){return r.nombre;});
  });
}

function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value.trim();
  var err = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  err.classList.add('hidden');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  fetch(API + '?sheet=Usuarios').then(function(r){return r.json();}).then(function(rows) {
    btn.textContent = 'Entrar';
    btn.disabled = false;
    var user = null;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].usuario === u && rows[i].password === p) { user = rows[i]; break; }
    }
    if (user) {
      currentUser = { user: u, nombre: user.nombre, rol: user.rol, initials: user.nombre.split(' ').map(function(x){return x[0];}).join('').slice(0,2) };
      localStorage.setItem('crm_user', JSON.stringify(currentUser));
      mostrarApp();
    } else {
      err.textContent = 'Usuario o contraseña incorrectos';
      err.classList.remove('hidden');
    }
  }).catch(function() {
    btn.textContent = 'Entrar';
    btn.disabled = false;
    err.textContent = 'Error de conexión. Intentá de nuevo.';
    err.classList.remove('hidden');
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  localStorage.removeItem('crm_user');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('btnEquipo').style.display = 'none';
}

(function() {
  var saved = localStorage.getItem('crm_user');
  if (saved) {
    try { currentUser = JSON.parse(saved); mostrarApp(); } catch(e) { localStorage.removeItem('crm_user'); }
  }
})();

function showTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  if (btn) btn.classList.add('active');
  loading();
  if (tab==='dashboard') loadDashboard();
  else if (tab==='propiedades') loadPropiedades();
  else if (tab==='desarrollos') loadDesarrollos();
  else if (tab==='finanzas') loadFinanzas();
  else if (tab==='objetivos') loadObjetivos();
  else if (tab==='equipo') loadEquipo();
}

function fmt(n,moneda) { return (moneda==='ARS'?'$':'USD ')+Number(n||0).toLocaleString('es-AR'); }
function fmtAuto(n,moneda) { return moneda==='ARS' ? '$'+Number(n||0).toLocaleString('es-AR') : 'USD '+Number(n||0).toLocaleString('es-AR'); }
function pct(a,m) { return Math.min(100,Math.round(Number(a||0)/Number(m||1)*100))||0; }
function estadoBadge(e) {
  if(e==='En venta') return 'badge-blue';
  if(e==='Vendida') return 'badge-green';
  if(e==='Reservada') return 'badge-amber';
  if(e==='En alquiler') return 'badge-purple';
  if(e==='Alquilada') return 'badge-green';
  if(e==='Activa') return 'badge-blue';
  if(e==='Cancelada') return 'badge-red';
  return 'badge-gray';
}
function progColor(p) { return p>=80?'#065f46':p>=50?'#185FA5':'#92400e'; }
function uid() { return Date.now().toString(); }
function today() { return new Date().toISOString().slice(0,10); }
function loading() { document.getElementById('tabContent').innerHTML = '<div class="loading"><span class="spinner"></span>Cargando...</div>'; }

// ==================== DASHBOARD ====================
function loadDashboard(filtroAgente) {
  var agente = filtroAgente || currentUser.nombre;
  Promise.all([
    fetch(API+'?sheet=Propiedades').then(function(r){return r.json();}),
    fetch(API+'?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Objetivos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Operaciones').then(function(r){return r.json();}),
    fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Reservas').then(function(r){return r.json();})
  ]).then(function(results) {
    var props = results[0]||[], fins = results[1]||[], objs = results[2]||[], ops = results[3]||[], gastos = results[4]||[], reservas = results[5]||[];

    props = props.filter(function(p){return p.agente===agente;});
    fins = fins.filter(function(f){return f.agente===agente;});
    gastos = gastos.filter(function(g){return g.agente===agente;});
    ops = ops.filter(function(o){return o.agente===agente;});
    reservas = reservas.filter(function(r){return r.agente===agente;});

    var enVenta = props.filter(function(p){return p.estado==='En venta';}).length;
    var reservadas = props.filter(function(p){return p.estado==='Reservada';}).length;
    var vendidas = props.filter(function(p){return p.estado==='Vendida';}).length;
    var gastosOficina = fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosProp = gastos.reduce(function(a,g){return a+Number(g.monto||0);},0);
    var comisiones = ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var rentabilidad = comisiones - gastosProp - gastosOficina;
    var comProyectadasReservas = reservas.reduce(function(a,r){return a+Number(r.precio_reserva||0)*(Number(r.comision_compradora||0)+Number(r.comision_vendedora||0))/100;},0);
    var comProyectadasStock = props.filter(function(p){return p.estado==='En venta';}).reduce(function(a,p){return a+Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},0);

    var html = '';
    if (currentUser.rol==='Líder') {
      html += '<div class="agente-selector"><span style="font-size:12px;color:#888;font-weight:500">Ver datos de:</span>';
      allAgentes.forEach(function(a) {
        html += '<div class="agente-chip' + (a===agente?' active':'') + '" onclick="loadDashboard(\'' + a + '\')">' + a.split(' ')[0] + '</div>';
      });
      html += '</div>';
    }

    html += '<div class="grid-metrics">'
      + '<div class="metric"><div class="metric-label">En venta</div><div class="metric-value blue">'+enVenta+'</div></div>'
      + '<div class="metric"><div class="metric-label">Reservadas</div><div class="metric-value amber">'+reservadas+'</div></div>'
      + '<div class="metric"><div class="metric-label">Vendidas</div><div class="metric-value green">'+vendidas+'</div></div>'
      + '<div class="metric"><div class="metric-label">Operaciones</div><div class="metric-value">'+ops.length+'</div></div>'
      + '<div class="metric"><div class="metric-label">Facturación bruta</div><div class="metric-value green">USD '+Number(comisiones).toLocaleString('es-AR')+'</div></div>'
      + '<div class="metric"><div class="metric-label">Gastos totales</div><div class="metric-value red">USD '+Number(gastosProp+gastosOficina).toLocaleString('es-AR')+'</div></div>'
      + '<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value '+(rentabilidad>=0?'green':'red')+'">USD '+Number(rentabilidad).toLocaleString('es-AR')+'</div></div>'
      + '<div class="metric"><div class="metric-label">Com. proyectada reservas</div><div class="metric-value amber">USD '+Number(comProyectadasReservas).toLocaleString('es-AR')+'</div></div>'
      + '<div class="metric"><div class="metric-label">Com. proyectada stock</div><div class="metric-value blue">USD '+Number(comProyectadasStock).toLocaleString('es-AR')+'</div></div>'
      + '</div>';

    html += '<div class="charts-grid">'
      + '<div class="chart-card"><div class="chart-title">Estado de propiedades</div><canvas id="chartEstados" height="200"></canvas></div>'
      + '<div class="chart-card"><div class="chart-title">Resultado financiero</div><canvas id="chartFinanzas" height="200"></canvas></div>'
      + '</div>';

    var objsFiltrados = objs.filter(function(o){return o.agente===agente||o.agente==='Equipo';});
    if (objsFiltrados.length) {
      html += '<div class="card"><div class="card-header"><span class="card-title">Objetivos en curso</span></div>';
      objsFiltrados.forEach(function(o) {
        var p = pct(o.actual, o.meta);
        html += '<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+o.titulo+' <span style="color:#888;font-size:11px">('+o.agente+')</span></span><span style="font-weight:600">'+o.actual+'/'+o.meta+' '+o.unidad+'</span></div>'
          +'<div class="progress-bar"><div class="progress-fill" style="width:'+p+'%;background:'+progColor(p)+'"></div></div></div>';
      });
      html += '</div>';
    }

    document.getElementById('tabContent').innerHTML = html;

    new Chart(document.getElementById('chartEstados'), {
      type:'doughnut',
      data:{labels:['En venta','Reservadas','Vendidas'],datasets:[{data:[enVenta,reservadas,vendidas],backgroundColor:['#3b82f6','#f59e0b','#10b981']}]},
      options:{responsive:true,plugins:{legend:{position:'bottom'}}}
    });
    new Chart(document.getElementById('chartFinanzas'), {
      type:'bar',
      data:{labels:['Facturación','Gastos','Rentabilidad','Com.Reservas','Com.Stock'],datasets:[{data:[comisiones,gastosProp+gastosOficina,rentabilidad,comProyectadasReservas,comProyectadasStock],backgroundColor:['#10b981','#ef4444',rentabilidad>=0?'#3b82f6':'#ef4444','#f59e0b','#8b5cf6']}]},
      options:{responsive:true,plugins:{legend:{display:false}}}
    });
  });
}

// ==================== PROPIEDADES ====================
function loadPropiedades() {
  getSheet('Propiedades', function(e, props) {
    props = (props||[]).filter(function(p){return p.agente===currentUser.nombre;});
    var html = '<div class="section-header"><div class="section-title">Propiedades</div><button class="btn btn-primary" onclick="abrirModalPropiedad()">+ Nueva propiedad</button></div>';
    if (props.length) {
      props.forEach(function(p) {
        html += '<div class="prop-card">'
          +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
          +'<div><div style="font-weight:700;font-size:15px">'+p.direccion+'</div>'

function loadFinanzas() {
  Promise.all([
    fetch(API+'?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API+'?sheet=Operaciones').then(function(r){return r.json();})
  ]).then(function(results) {
    var fins=(results[0]||[]).filter(function(f){return f.agente===currentUser.nombre;});
    var gastos=(results[1]||[]).filter(function(g){return g.agente===currentUser.nombre;});
    var ops=(results[2]||[]).filter(function(o){return o.agente===currentUser.nombre;});
    var gastosOficina=fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosPropUSD=gastos.filter(function(g){return g.moneda!=='ARS';}).reduce(function(a,g){return a+Number(g.monto||0);},0);
    var gastosPropARS=gastos.filter(function(g){return g.moneda==='ARS';}).reduce(function(a,g){return a+Number(g.monto||0);},0);
    var comisiones=ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var rentabilidad=comisiones-gastosPropUSD-gastosOficina;

    var html='<div class="grid-metrics">'
      +'<div class="metric"><div class="metric-label">Facturación bruta</div><div class="metric-value green">USD '+Number(comisiones).toLocaleString('es-AR')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos prop. USD</div><div class="metric-value red">USD '+Number(gastosPropUSD).toLocaleString('es-AR')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos prop. ARS</div><div class="metric-value red">$ '+Number(gastosPropARS).toLocaleString('es-AR')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Gastos oficina</div><div class="metric-value red">USD '+Number(gastosOficina).toLocaleString('es-AR')+'</div></div>'
      +'<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value '+(rentabilidad>=0?'green':'red')+'">USD '+Number(rentabilidad).toLocaleString('es-AR')+'</div></div>'
      +'</div>';

    html+='<div class="section-header" style="margin-top:1rem"><div class="section-title">Movimientos de oficina</div><button class="btn btn-primary btn-sm" onclick="abrirModalFinanza()">+ Agregar</button></div>';
    if(fins.length){
      html+='<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Monto</th><th></th></tr>';
      fins.forEach(function(f){
        html+='<tr><td>'+f.fecha+'</td><td><span class="badge '+(f.tipo==='Ingreso'?'badge-green':'badge-red')+'">'+f.tipo+'</span></td><td>'+f.concepto+'</td><td style="font-weight:600;color:'+(f.tipo==='Ingreso'?'#065f46':'#991b1b')+'">USD '+Number(f.monto||0).toLocaleString('es-AR')+'</td><td><button class="btn btn-sm" onclick="delRow(\'Finanzas\',\''+f.id+'\',function(){loadFinanzas();})">×</button></td></tr>';
      });
      html+='</table></div></div>';
    } else { html+='<div class="empty">No hay movimientos.</div>'; }

    html+='<div class="section-header" style="margin-top:1.5rem"><div class="section-title">Gastos por propiedad</div></div>';
    if(gastos.length){
      html+='<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Fecha</th><th>Concepto</th><th>Moneda</th><th>Monto</th></tr>';
      gastos.forEach(function(g){
        html+='<tr><td>'+g.fecha+'</td><td>'+g.concepto+'</td><td>'+(g.moneda||'USD')+'</td><td style="font-weight:600;color:#991b1b">'+(g.moneda==='ARS'?'$':'USD ')+Number(g.monto||0).toLocaleString('es-AR')+'</td></tr>';
      });
      html+='</table></div></div>';
    } else { html+='<div class="empty">No hay gastos por propiedad.</div>'; }

    document.getElementById('tabContent').innerHTML=html;
  });
}

function abrirModalFinanza() {
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Nuevo movimiento</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div class="row"><div class="form-group"><label>Tipo</label><select id="ff-tipo"><option>Ingreso</option><option>Gasto</option></select></div>'
    +'<div class="form-group"><label>Fecha</label><input id="ff-fecha" type="date" value="'+today()+'" /></div></div>'
    +'<div class="form-group"><label>Concepto</label><input id="ff-concepto" autocomplete="off" /></div>'
    +'<div class="form-group"><label>Monto (USD)</label><input id="ff-monto" type="number" /></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarFinanza()">Guardar</button></div>';
  openModal();
}
function guardarFinanza() {
  var data={id:uid(),fecha:v('ff-fecha'),tipo:v('ff-tipo'),concepto:v('ff-concepto'),monto:v('ff-monto'),agente:currentUser.nombre};
  closeModal(); loading(); addRow('Finanzas',data,function(){loadFinanzas();});
}

// ==================== OBJETIVOS ====================
function loadObjetivos() {
  getSheet('Objetivos', function(e, objs) {
    objs=(objs||[]).filter(function(o){return o.agente===currentUser.nombre||o.agente==='Equipo';});
    var html='<div class="section-header"><div class="section-title">Objetivos</div><button class="btn btn-primary btn-sm" onclick="abrirModalObjetivo()">+ Agregar</button></div>';
    if(objs.length){
      objs.forEach(function(o){
        var p=pct(o.actual,o.meta);
        html+='<div class="obj-card">'
          +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
          +'<div><div style="font-weight:600;font-size:14px">'+o.titulo+'</div>'
          +'<div style="font-size:12px;color:#888;margin-top:3px">'+o.agente+(o.vencimiento?' · Vence '+o.vencimiento:'')+(o.periodo?' · '+o.periodo:'')+'</div></div>'
          +'<div style="text-align:right"><div style="font-size:20px;font-weight:700">'+o.actual+' <span style="font-size:13px;color:#888;font-weight:400">/ '+o.meta+' '+o.unidad+'</span></div>'
          +'<div style="font-size:12px;color:#888">'+p+'% completado</div></div></div>'
          +'<div class="progress-bar"><div class="progress-fill" style="width:'+p+'%;background:'+progColor(p)+'"></div></div>'
          +'<div class="obj-actions"><button class="btn btn-sm btn-primary" onclick="actualizarProgreso(\''+o.id+'\',\''+esc(o.titulo)+'\','+o.actual+','+o.meta+',\''+esc(o.unidad)+'\')">Actualizar</button>'
          +'<button class="btn btn-sm" onclick="delRow(\'Objetivos\',\''+o.id+'\',function(){loadObjetivos();})">Eliminar</button></div>'
          +'</div>';
      });
    } else { html+='<div class="empty">No hay objetivos.</div>'; }
    document.getElementById('tabContent').innerHTML=html;
  });
}

function abrirModalObjetivo() {
  var agentesOpts = currentUser.rol==='Líder' ? '<option>Equipo</option>'+allAgentes.map(function(a){return '<option>'+a+'</option>';}).join('') : '<option>'+currentUser.nombre+'</option>';
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Nuevo objetivo</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div class="form-group"><label>Título</label><input id="fo-titulo" autocomplete="off" /></div>'
    +'<div class="row"><div class="form-group"><label>Meta</label><input id="fo-meta" type="number" /></div>'
    +'<div class="form-group"><label>Unidad</label><input id="fo-unidad" placeholder="ventas, USD..." autocomplete="off" /></div></div>'
    +'<div class="row"><div class="form-group"><label>Período</label><select id="fo-periodo"><option>Mensual</option><option>Anual</option></select></div>'
    +'<div class="form-group"><label>Vencimiento</label><input id="fo-venc" type="date" /></div></div>'
    +'<div class="form-group"><label>Agente</label><select id="fo-agente">'+agentesOpts+'</select></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarObjetivo()">Guardar</button></div>';
  openModal();
}
function guardarObjetivo() {
  var data={id:uid(),titulo:v('fo-titulo'),meta:v('fo-meta'),actual:0,unidad:v('fo-unidad'),periodo:v('fo-periodo'),agente:v('fo-agente'),vencimiento:v('fo-venc')};
  closeModal(); loading(); addRow('Objetivos',data,function(){loadObjetivos();});
}
function actualizarProgreso(id,titulo,actual,meta,unidad) {
  document.getElementById('modalBox').innerHTML='<div class="modal-header"><span class="modal-title">Actualizar progreso</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:14px;margin-bottom:1rem;font-weight:500">'+titulo+'</div>'
    +'<div class="form-group"><label>Progreso actual (de '+meta+' '+unidad+')</label><input id="upd-actual" type="number" value="'+actual+'" /></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarProgreso(\''+id+'\')">Guardar</button></div>';
  openModal();
}
function guardarProgreso(id) { var a=v('upd-actual'); closeModal(); loading(); updRow('Objetivos',id,{actual:a},function(){loadObjetivos();}); }

// ==================== PANEL EQUIPO ====================
function loadEquipo() {
  if(currentUser.rol!=='Líder'){document.getElementById('tabContent').innerHTML='<div class="empty">Acceso restringido.</div>';return;}
  var vistaActual = 'consolidado';
  var agenteActual = allAgentes[0]||'';

  function render(vista, agente) {
    vistaActual = vista;
    if(agente) agenteActual = agente;

    Promise.all([
      fetch(API+'?sheet=Propiedades').then(function(r){return r.json();}),
      fetch(API+'?sheet=Operaciones').then(function(r){return r.json();}),
      fetch(API+'?sheet=Gastos').then(function(r){return r.json();}),
      fetch(API+'?sheet=Finanzas').then(function(r){return r.json();}),
      fetch(API+'?sheet=Reservas').then(function(r){return r.json();})
    ]).then(function(results) {
      var allProps=results[0]||[], allOps=results[1]||[], allGastos=results[2]||[], allFins=results[3]||[], allReservas=results[4]||[];

      var html='<div class="section-title" style="margin-bottom:1rem">Panel del Equipo</div>';
      html+='<div class="tabs-secondary">'
        +'<div class="tab-sec'+(vistaActual==='consolidado'?' active':'')+'" onclick="loadEquipo()">Vista consolidada</div>'
        +'<div class="tab-sec'+(vistaActual==='individual'?' active':'')+'" onclick="renderIndividual()">Vista individual</div>'
        +'</div>';

      if(vistaActual==='consolidado'){
        html+='<div style="margin-bottom:1rem;font-size:13px;color:#888">Datos de todo el equipo combinados</div>';
        allAgentes.forEach(function(agNombre){
          var props=allProps.filter(function(p){return p.agente===agNombre;});
          var ops=allOps.filter(function(o){return o.agente===agNombre;});
          var gastos=allGastos.filter(function(g){return g.agente===agNombre;});
          var fins=allFins.filter(function(f){return f.agente===agNombre;});
          var reservas=allReservas.filter(function(r){return r.agente===agNombre;});
          var enVenta=props.filter(function(p){return p.estado==='En venta';}).length;
          var reservadas=props.filter(function(p){return p.estado==='Reservada';}).length;
          var comisiones=ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
          var gastosTotal=gastos.reduce(function(a,g){return a+Number(g.monto||0);},0)+fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
          var comReservas=reservas.reduce(function(a,r){return a+Number(r.precio_reserva||0)*(Number(r.comision_compradora||0)+Number(r.comision_vendedora||0))/100;},0);
          var comStock=props.filter(function(p){return p.estado==='En venta';}).reduce(function(a,p){return a+Number(p.precio||0)*(Number(p.comision_compradora||0)+Number(p.comision_vendedora||0))/100;},0);

          html+='<div class="card">'
            +'<div class="card-header"><span class="card-title">'+agNombre+'</span><span class="rol-badge">Agente</span></div>'
            +'<div class="grid-metrics" style="margin-bottom:0">'
            +'<div class="metric"><div class="metric-label">En venta</div><div class="metric-value blue" style="font-size:18px">'+enVenta+'</div></div>'
            +'<div class="metric"><div class="metric-label">Reservadas</div><div class="metric-value amber" style="font-size:18px">'+reservadas+'</div></div>'
            +'<div class="metric"><div class="metric-label">Facturación</div><div class="metric-value green" style="font-size:16px">USD '+Number(comisiones).toLocaleString('es-AR')+'</div></div>'
            +'<div class="metric"><div class="metric-label">Gastos</div><div class="metric-value red" style="font-size:16px">USD '+Number(gastosTotal).toLocaleString('es-AR')+'</div></div>'
            +'<div class="metric"><div class="metric-label">Com. reservas</div><div class="metric-value amber" style="font-size:16px">USD '+Number(comReservas).toLocaleString('es-AR')+'</div></div>'
            +'<div class="metric"><div class="metric-label">Com. stock</div><div class="metric-value blue" style="font-size:16px">USD '+Number(comStock).toLocaleString('es-AR')+'</div></div>'
            +'</div></div>';
        });
      } else {
        html+='<div class="agente-selector"><span style="font-size:12px;color:#888;font-weight:500">Agente:</span>';
        allAgentes.forEach(function(a){
          html+='<div class="agente-chip'+(a===agenteActual?' active':'')+'" onclick="renderIndividual(\''+a+'\')">'+a.split(' ')[0]+'</div>';
        });
        html+='</div>';

        var props=allProps.filter(function(p){return p.agente===agenteActual;});
        var ops=allOps.filter(function(o){return o.agente===agenteActual;});
        var gastos=allGastos.filter(function(g){return g.agente===agenteActual;});
        var fins=allFins.filter(function(f){return f.agente===agenteActual;});

        html+='<div class="grid-metrics">'
          +'<div class="metric"><div class="metric-label">En venta</div><div class="metric-value blue">'+props.filter(function(p){return p.estado==='En venta';}).length+'</div></div>'
          +'<div class="metric"><div class="metric-label">Reservadas</div><div class="metric-value amber">'+props.filter(function(p){return p.estado==='Reservada';}).length+'</div></div>'
          +'<div class="metric"><div class="metric-label">Vendidas</div><div class="metric-value green">'+props.filter(function(p){return p.estado==='Vendida';}).length+'</div></div>'
          +'<div class="metric"><div class="metric-label">Operaciones</div><div class="metric-value">'+ops.length+'</div></div>'
          +'<div class="metric"><div class="metric-label">Facturación</div><div class="metric-value green">USD '+Number(ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0)).toLocaleString('es-AR')+'</div></div>'
          +'<div class="metric"><div class="metric-label">Gastos</div><div class="metric-value red">USD '+Number(gastos.reduce(function(a,g){return a+Number(g.monto||0);},0)).toLocaleString('es-AR')+'</div></div>'
          +'</div>';

        html+='<div class="card"><div class="card-header"><span class="card-title">Propiedades de '+agenteActual.split(' ')[0]+'</span></div>';
        if(props.length){
          html+='<div class="table-wrap"><table><tr><th>Dirección</th><th>Tipo</th><th>Estado</th><th>Precio</th></tr>';
          props.forEach(function(p){
            html+='<tr><td>'+p.direccion+'</td><td>'+p.tipo+'</td><td><span class="badge '+estadoBadge(p.estado)+'">'+p.estado+'</span></td><td>USD '+Number(p.precio||0).toLocaleString('es-AR')+'</td></tr>';
          });
          html+='</table></div>';
        } else { html+='<div class="empty">Sin propiedades.</div>'; }
        html+='</div>';
      }

      document.getElementById('tabContent').innerHTML=html;

      window.renderIndividual = function(agente) { render('individual', agente||agenteActual); };
    });
  }

  render('consolidado', agenteActual);
  window.renderIndividual = function(agente) { render('individual', agente||agenteActual); };
}

function v(id){return document.getElementById(id)?document.getElementById(id).value:'';}
function loading(){document.getElementById('tabContent').innerHTML='<div class="loading"><span class="spinner"></span>Cargando...</div>';}
function openModal(){document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';document.getElementById('modalBox').innerHTML='';}
function closeModalOverlay(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
</script>
