<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Olivera CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px}
    .hidden{display:none}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#185FA5,#0C447C)}
    .login-box{background:#fff;border-radius:16px;padding:2.5rem;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
    .login-box h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#185FA5}
    .login-box p{font-size:13px;color:#666;margin-bottom:1.5rem}
    .alert{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a}
    .form-group textarea{resize:vertical}
    .row{display:flex;gap:10px}
    .row .form-group{flex:1}
    .btn{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;font-weight:500}
    .btn:hover{background:#f5f5f5}
    .btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn-primary:hover{background:#0C447C}
    .btn-success{background:#065f46;color:#fff;border-color:#065f46}
    .btn-success:hover{background:#044232}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-full{width:100%;padding:12px;font-size:15px}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .topbar-logo{font-size:16px;font-weight:700;color:#185FA5}
    .topbar-logo span{color:#1a1a1a;font-weight:400}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .rol-badge{font-size:11px;background:#EFF6FF;color:#185FA5;padding:2px 8px;border-radius:20px;font-weight:500}
    .nav{display:flex;gap:4px;padding:10px 24px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
    .nav-btn{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
    .nav-btn.active{background:#EFF6FF;color:#185FA5}
    .content{padding:24px;max-width:1100px;margin:0 auto}
    .grid-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:1.5rem}
    .metric{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .metric-label{font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
    .metric-value{font-size:26px;font-weight:700}
    .metric-value.green{color:#065f46}
    .metric-value.red{color:#991b1b}
    .metric-value.blue{color:#1e40af}
    .metric-value.amber{color:#92400e}
    .card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .card-title{font-size:15px;font-weight:600}
    .charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:1.5rem}
    .chart-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .chart-title{font-size:13px;font-weight:600;color:#555;margin-bottom:1rem}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;color:#888;font-weight:500;border-bottom:1px solid #eee;font-size:12px;text-transform:uppercase;letter-spacing:0.3px}
    td{padding:10px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-green{background:#d1fae5;color:#065f46}
    .badge-amber{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-purple{background:#ede9fe;color:#5b21b6}
    .badge-gray{background:#f3f4f6;color:#374151}
    .progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-top:8px}
    .progress-fill{height:8px;border-radius:4px;transition:width 0.3s}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .modal{background:#fff;border-radius:16px;padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .modal-title{font-size:16px;font-weight:600}
    .close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1}
    .loading{text-align:center;padding:3rem;color:#888;font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .section-title{font-size:18px;font-weight:700}
    .prop-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .prop-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .prop-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
    .obj-card{background:#fff;border-radius:12px;border:1px solid #eee;padding:1.25rem;margin-bottom:0.75rem}
    .obj-actions{display:flex;gap:6px;margin-top:12px}
    .empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
    .section-divider{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin:1rem 0 0.5rem;border-bottom:1px solid #eee;padding-bottom:6px}
  </style>
</head>
<body>

<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <h1>Team Olivera</h1>
    <p>CRM Inmobiliario · teamolivera.com</p>
    <div id="loginError" class="alert hidden">Usuario o contraseña incorrectos</div>
    <form autocomplete="off" onsubmit="return false">
      <input type="text" style="display:none" />
      <input type="password" style="display:none" />
      <div class="form-group">
        <label>Usuario</label>
        <input id="loginUser" type="text" placeholder="golivera / gquintana" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input id="loginPass" type="password" placeholder="••••••" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Entrar</button>
    </form>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="topbar">
    <div class="topbar-logo">Team Olivera <span>CRM</span></div>
    <div class="topbar-right">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#555">
        <div class="avatar" id="avatarTop">GO</div>
        <div>
          <div style="font-weight:600;font-size:13px" id="userNameTop"></div>
          <div class="rol-badge" id="userRolTop"></div>
        </div>
      </div>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showTab('propiedades',this)">Propiedades</button>
    <button class="nav-btn" onclick="showTab('finanzas',this)">Finanzas</button>
    <button class="nav-btn" onclick="showTab('objetivos',this)">Objetivos</button>
  </div>
  <div class="content" id="tabContent"></div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
var API = 'https://sheetdb.io/api/v1/8al8hyqbj13qm';
var currentUser = null;

function getSheet(sheet, callback) {
  fetch(API + '?sheet=' + sheet)
    .then(function(r) { return r.json(); })
    .then(function(d) { callback(null, d); })
    .catch(function(e) { callback(e, null); });
}

function addRow(sheet, data, callback) {
  fetch(API + '?sheet=' + sheet, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: [data] })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) { if(callback) callback(null, d); })
  .catch(function(e) { if(callback) callback(e, null); });
}

function deleteRow(sheet, id, callback) {
  fetch(API + '/id/' + id + '?sheet=' + sheet, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(d) { if(callback) callback(null, d); })
    .catch(function(e) { if(callback) callback(e, null); });
}

function updateRow(sheet, id, data, callback) {
  fetch(API + '/id/' + id + '?sheet=' + sheet, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: data })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) { if(callback) callback(null, d); })
  .catch(function(e) { if(callback) callback(e, null); });
}

function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value.trim();
  var err = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  err.classList.add('hidden');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  fetch(API + '?sheet=Usuarios')
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      var user = null;
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].usuario === u && rows[i].password === p) {
          user = rows[i];
          break;
        }
      }
      if (user) {
        currentUser = { user: u, nombre: user.nombre, rol: user.rol, initials: user.nombre.split(' ').map(function(x){return x[0]}).join('').slice(0,2) };
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('avatarTop').textContent = currentUser.initials;
        document.getElementById('userNameTop').textContent = currentUser.nombre;
        document.getElementById('userRolTop').textContent = currentUser.rol;
        showTab('dashboard', document.querySelector('.nav-btn'));
      } else {
        err.textContent = 'Usuario o contraseña incorrectos';
        err.classList.remove('hidden');
      }
    })
    .catch(function() {
      btn.textContent = 'Entrar';
      btn.disabled = false;
      err.textContent = 'Error de conexión. Intentá de nuevo.';
      err.classList.remove('hidden');
    });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginWrap').style.minHeight = '100vh';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function showTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  document.getElementById('tabContent').innerHTML = '<div class="loading"><span class="spinner"></span>Cargando...</div>';
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'propiedades') loadPropiedades();
  if (tab === 'finanzas') loadFinanzas();
  if (tab === 'objetivos') loadObjetivos();
}

function fmt(n) { return '$' + Number(n||0).toLocaleString('es-AR'); }
function pct(a, m) { return Math.min(100, Math.round(Number(a||0) / Number(m||1) * 100)) || 0; }
function estadoBadge(e) {
  if (e === 'En venta') return 'badge-blue';
  if (e === 'Vendida') return 'badge-green';
  if (e === 'Reservada') return 'badge-amber';
  if (e === 'En alquiler') return 'badge-purple';
  if (e === 'Alquilada') return 'badge-green';
  return 'badge-gray';
}
function progColor(p) { return p >= 80 ? '#065f46' : p >= 50 ? '#185FA5' : '#92400e'; }
function uid() { return Date.now().toString(); }
function today() { return new Date().toISOString().slice(0,10); }

// DASHBOARD
function loadDashboard() {
  Promise.all([
    fetch(API + '?sheet=Propiedades').then(function(r){return r.json();}),
    fetch(API + '?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API + '?sheet=Objetivos').then(function(r){return r.json();}),
    fetch(API + '?sheet=Operaciones').then(function(r){return r.json();}),
    fetch(API + '?sheet=Gastos').then(function(r){return r.json();})
  ]).then(function(results) {
    var props = results[0] || [];
    var fins = results[1] || [];
    var objs = results[2] || [];
    var ops = results[3] || [];
    var gastos = results[4] || [];

    if (currentUser.rol !== 'Líder') {
      props = props.filter(function(p){return p.agente === currentUser.nombre;});
      fins = fins.filter(function(f){return f.agente === currentUser.nombre;});
      gastos = gastos.filter(function(g){return g.agente === currentUser.nombre;});
      ops = ops.filter(function(o){return o.agente === currentUser.nombre;});
    }

    var enVenta = props.filter(function(p){return p.estado==='En venta';}).length;
    var reservadas = props.filter(function(p){return p.estado==='Reservada';}).length;
    var vendidas = props.filter(function(p){return p.estado==='Vendida';}).length;
    var gastosOficina = fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosProp = gastos.reduce(function(a,g){return a+Number(g.monto||0);},0);
    var comisiones = ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var rentabilidad = comisiones - gastosProp - gastosOficina;

    var html = '<div class="grid-metrics">'
      + '<div class="metric"><div class="metric-label">En venta</div><div class="metric-value blue">' + enVenta + '</div></div>'
      + '<div class="metric"><div class="metric-label">Reservadas</div><div class="metric-value amber">' + reservadas + '</div></div>'
      + '<div class="metric"><div class="metric-label">Vendidas</div><div class="metric-value green">' + vendidas + '</div></div>'
      + '<div class="metric"><div class="metric-label">Operaciones</div><div class="metric-value">' + ops.length + '</div></div>'
      + '<div class="metric"><div class="metric-label">Facturación bruta</div><div class="metric-value green">' + fmt(comisiones) + '</div></div>'
      + '<div class="metric"><div class="metric-label">Gastos totales</div><div class="metric-value red">' + fmt(gastosProp + gastosOficina) + '</div></div>'
      + '<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value ' + (rentabilidad >= 0 ? 'green' : 'red') + '">' + fmt(rentabilidad) + '</div></div>'
      + '</div>';

    html += '<div class="charts-grid">'
      + '<div class="chart-card"><div class="chart-title">Estado de propiedades</div><canvas id="chartEstados" height="200"></canvas></div>'
      + '<div class="chart-card"><div class="chart-title">Ingresos vs Gastos</div><canvas id="chartFinanzas" height="200"></canvas></div>'
      + '</div>';

    if (objs.length) {
      var objsFiltrados = currentUser.rol === 'Líder' ? objs : objs.filter(function(o){return o.agente === currentUser.nombre || o.agente === 'Equipo';});
      if (objsFiltrados.length) {
        html += '<div class="card"><div class="card-header"><span class="card-title">Objetivos en curso</span></div>';
        objsFiltrados.forEach(function(o) {
          var p = pct(o.actual, o.meta);
          html += '<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>' + o.titulo + ' <span style="color:#888;font-size:11px">(' + o.agente + ')</span></span><span style="font-weight:600">' + o.actual + '/' + o.meta + ' ' + o.unidad + '</span></div>'
            + '<div class="progress-bar"><div class="progress-fill" style="width:' + p + '%;background:' + progColor(p) + '"></div></div></div>';
        });
        html += '</div>';
      }
    }

    document.getElementById('tabContent').innerHTML = html;

    new Chart(document.getElementById('chartEstados'), {
      type: 'doughnut',
      data: {
        labels: ['En venta', 'Reservadas', 'Vendidas'],
        datasets: [{ data: [enVenta, reservadas, vendidas], backgroundColor: ['#3b82f6','#f59e0b','#10b981'] }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    new Chart(document.getElementById('chartFinanzas'), {
      type: 'bar',
      data: {
        labels: ['Facturación', 'Gastos prop.', 'Gastos oficina', 'Rentabilidad'],
        datasets: [{ data: [comisiones, gastosProp, gastosOficina, rentabilidad], backgroundColor: ['#10b981','#ef4444','#f59e0b', rentabilidad >= 0 ? '#3b82f6' : '#ef4444'] }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  }).catch(function() {
    document.getElementById('tabContent').innerHTML = '<div class="empty">Error cargando datos.</div>';
  });
}

// PROPIEDADES
function loadPropiedades() {
  getSheet('Propiedades', function(e, props) {
    if (currentUser.rol !== 'Líder') {
      props = (props||[]).filter(function(p){return p.agente === currentUser.nombre;});
    } else {
      props = props || [];
    }
    var html = '<div class="section-header"><div class="section-title">Propiedades</div><button class="btn btn-primary" onclick="abrirModalPropiedad()">+ Nueva propiedad</button></div>';
    if (props.length) {
      props.forEach(function(p) {
        html += '<div class="prop-card">'
          + '<div class="prop-header">'
          + '<div>'
          + '<div style="font-weight:700;font-size:15px">' + p.direccion + '</div>'
          + '<div style="font-size:12px;color:#888;margin-top:3px">' + (p.localidad||'') + (p.localidad&&p.tipo?' · ':'') + (p.tipo||'') + ' · ' + (p.agente||'').split(' ').slice(-1)[0] + '</div>'
          + (p.cliente ? '<div style="font-size:12px;color:#555;margin-top:4px">👤 ' + p.cliente + (p.telefono ? ' · ' + p.telefono : '') + '</div>' : '')
          + '</div>'
          + '<div style="text-align:right">'
          + '<div style="font-weight:700;font-size:16px;color:#185FA5">' + fmt(p.precio) + '</div>'
          + (p.valor_cierre ? '<div style="font-size:12px;color:#065f46;margin-top:2px">Cierre: ' + fmt(p.valor_cierre) + '</div>' : '')
          + '<div style="margin-top:4px"><span class="badge ' + estadoBadge(p.estado) + '">' + p.estado + '</span></div>'
          + '</div>'
          + '</div>'
          + '<div class="prop-actions">'
          + '<button class="btn btn-sm btn-primary" onclick="abrirGastosProp(\'' + p.id + '\',\'' + p.direccion.replace(/'/g,"\\'") + '\')">+ Gasto</button>'
          + '<button class="btn btn-sm btn-success" onclick="abrirReserva(\'' + p.id + '\',\'' + p.direccion.replace(/'/g,"\\'") + '\',\'' + (p.precio||0) + '\')">Reservar/Vender</button>'
          + '<button class="btn btn-sm" onclick="cambiarEstado(\'' + p.id + '\')">Estado</button>'
          + '<button class="btn btn-sm" onclick="editarPropiedad(\'' + p.id + '\')">Editar</button>'
          + '<button class="btn btn-sm" style="color:#991b1b;border-color:#fecaca" onclick="eliminarProp(\'' + p.id + '\')">Eliminar</button>'
          + '</div>'
          + '</div>';
      });
    } else {
      html += '<div class="empty">No hay propiedades. Agregá la primera con el botón de arriba.</div>';
    }
    document.getElementById('tabContent').innerHTML = html;
  });
}

function abrirModalPropiedad(propData) {
  var editar = propData ? true : false;
  var d = propData || {};
  document.getElementById('modalBox').innerHTML = '<div class="modal-header"><span class="modal-title">' + (editar ? 'Editar propiedad' : 'Nueva propiedad') + '</span><button class="close-btn" onclick="closeModal()">×</button></div>'

    + '<div class="section-divider">Datos de la propiedad</div>'
    + '<div class="row"><div class="form-group"><label>Dirección</label><input id="f-dir" value="' + (d.direccion||'') + '" autocomplete="off" /></div>'
    + '<div class="form-group"><label>Localidad</label><input id="f-loc" value="' + (d.localidad||'Villa Urquiza') + '" autocomplete="off" /></div></div>'
    + '<div class="row"><div class="form-group"><label>Tipo</label><select id="f-tipo"><option' + (d.tipo==='Departamento'?' selected':'') + '>Departamento</option><option' + (d.tipo==='PH'?' selected':'') + '>PH</option><option' + (d.tipo==='Casa'?' selected':'') + '>Casa</option><option' + (d.tipo==='Local'?' selected':'') + '>Local</option><option' + (d.tipo==='Oficina'?' selected':'') + '>Oficina</option></select></div>'

    + '</div>';
  openModal();
}

function abrirReserva(propId, dir, precioActual) {
  document.getElementById('modalBox').innerHTML = '<div class="modal-header"><span class="modal-title">Reservar / Cerrar operación</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    + '<div style="font-size:13px;color:#666;margin-bottom:1rem">' + dir + '</div>'
    + '<div class="row"><div class="form-group"><label>Valor de cierre (USD)</label><input id="r-cierre" type="number" value="' + precioActual + '" /></div>'
    + '<div class="form-group"><label>Fecha</label><input id="r-fecha" type="date" value="' + today() + '" /></div></div>'
    + '<div class="row"><div class="form-group"><label>Comisión comprador (%)</label><input id="r-comp" type="number" value="3" /></div>'
    + '<div class="form-group"><label>Comisión vendedor (%)</label><input id="r-vend" type="number" value="3" /></div></div>'
    + '<div id="r-preview" style="background:#f0f9ff;border-radius:8px;padding:12px;margin:1rem 0;font-size:13px"></div>'
    + '<div class="form-group"><label>Nuevo estado</label><select id="r-estado"><option>Reservada</option><option>Vendida</option></select></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="guardarCierre(\'' + propId + '\')">Confirmar</button></div>';
  openModal();

  function actualizarPreview() {
    var cierre = Number(document.getElementById('r-cierre').value||0);
    var comp = Number(document.getElementById('r-comp').value||0);
    var vend = Number(document.getElementById('r-vend').value||0);
    var total = cierre * (comp + vend) / 100;
    document.getElementById('r-preview').innerHTML =
      '<strong>Comisión compradora:</strong> ' + fmt(cierre * comp / 100) + '<br>'
      + '<strong>Comisión vendedora:</strong> ' + fmt(cierre * vend / 100) + '<br>'
      + '<strong style="color:#065f46">Comisión total proyectada: ' + fmt(total) + '</strong>';
  }
  document.getElementById('r-cierre').addEventListener('input', actualizarPreview);
  document.getElementById('r-comp').addEventListener('input', actualizarPreview);
  document.getElementById('r-vend').addEventListener('input', actualizarPreview);
  actualizarPreview();
}

function guardarCierre(propId) {
  var cierre = Number(document.getElementById('r-cierre').value||0);
  var comp = Number(document.getElementById('r-comp').value||0);
  var vend = Number(document.getElementById('r-vend').value||0);
  var total = cierre * (comp + vend) / 100;
  var estado = document.getElementById('r-estado').value;
  var fecha = document.getElementById('r-fecha').value;

  closeModal();
  loading();

  updateRow('Propiedades', propId, { valor_cierre: cierre, estado: estado, comision_compradora: comp, comision_vendedora: vend }, function() {
    var opData = {
      id: uid(),
      fecha: fecha,
      propiedad_id: propId,
      precio_final: cierre,
      comision_total: total,
      gastos_total: 0,
      rentabilidad: total,
      agente: currentUser.nombre
    };
    addRow('Operaciones', opData, function() { loadPropiedades(); });
  });
}

// FINANZAS
function loadFinanzas() {
  Promise.all([
    fetch(API + '?sheet=Finanzas').then(function(r){return r.json();}),
    fetch(API + '?sheet=Gastos').then(function(r){return r.json();}),
    fetch(API + '?sheet=Operaciones').then(function(r){return r.json();})
  ]).then(function(results) {
    var fins = results[0] || [];
    var gastos = results[1] || [];
    var ops = results[2] || [];

    if (currentUser.rol !== 'Líder') {
      fins = fins.filter(function(f){return f.agente === currentUser.nombre;});
      gastos = gastos.filter(function(g){return g.agente === currentUser.nombre;});
      ops = ops.filter(function(o){return o.agente === currentUser.nombre;});
    }

    var gastosOficina = fins.filter(function(f){return f.tipo==='Gasto';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var ingresos = fins.filter(function(f){return f.tipo==='Ingreso';}).reduce(function(a,f){return a+Number(f.monto||0);},0);
    var gastosProp = gastos.reduce(function(a,g){return a+Number(g.monto||0);},0);
    var comisiones = ops.reduce(function(a,o){return a+Number(o.comision_total||0);},0);
    var rentabilidad = comisiones - gastosProp - gastosOficina;

    var html = '<div class="grid-metrics">'
      + '<div class="metric"><div class="metric-label">Facturación bruta</div><div class="metric-value green">' + fmt(comisiones) + '</div></div>'
      + '<div class="metric"><div class="metric-label">Gastos propiedades</div><div class="metric-value red">' + fmt(gastosProp) + '</div></div>'
      + '<div class="metric"><div class="metric-label">Gastos oficina</div><div class="metric-value red">' + fmt(gastosOficina) + '</div></div>'
      + '<div class="metric"><div class="metric-label">Rentabilidad neta</div><div class="metric-value ' + (rentabilidad>=0?'green':'red') + '">' + fmt(rentabilidad) + '</div></div>'
      + '</div>';

    html += '<div class="charts-grid">'
      + '<div class="chart-card"><div class="chart-title">Distribución de gastos</div><canvas id="chartGastos" height="200"></canvas></div>'
      + '<div class="chart-card"><div class="chart-title">Resultado financiero</div><canvas id="chartResult" height="200"></canvas></div>'
      + '</div>';

    html += '<div class="section-header" style="margin-top:1rem"><div class="section-title">Movimientos de oficina</div><button class="btn btn-primary btn-sm" onclick="abrirModalFinanza()">+ Agregar</button></div>';
    if (fins.length) {
      html += '<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Agente</th><th>Monto</th><th></th></tr>';
      fins.forEach(function(f) {
        html += '<tr><td>' + f.fecha + '</td><td><span class="badge ' + (f.tipo==='Ingreso'?'badge-green':'badge-red') + '">' + f.tipo + '</span></td><td>' + f.concepto + '</td><td style="color:#888">' + (f.agente||'').split(' ').slice(-1)[0] + '</td><td style="font-weight:600;color:' + (f.tipo==='Ingreso'?'#065f46':'#991b1b') + '">' + fmt(f.monto) + '</td><td><button class="btn btn-sm" onclick="eliminarFin(\'' + f.id + '\')">×</button></td></tr>';
      });
      html += '</table></div></div>';
    } else {
      html += '<div class="empty">No hay movimientos de oficina.</div>';
    }

    html += '<div class="section-header" style="margin-top:1.5rem"><div class="section-title">Gastos por propiedad</div></div>';
    if (gastos.length) {
      html += '<div class="card" style="padding:0"><div class="table-wrap"><table><tr><th>Fecha</th><th>Concepto</th><th>Agente</th><th>Monto</th></tr>';
      gastos.forEach(function(g) {
        html += '<tr><td>' + g.fecha + '</td><td>' + g.concepto + '</td><td style="color:#888">' + (g.agente||'').split(' ').slice(-1)[0] + '</td><td style="font-weight:600;color:#991b1b">' + fmt(g.monto) + '</td></tr>';
      });
      html += '</table></div></div>';
    } else {
      html += '<div class="empty">No hay gastos por propiedad.</div>';
    }

    document.getElementById('tabContent').innerHTML = html;

    new Chart(document.getElementById('chartGastos'), {
      type: 'pie',
      data: {
        labels: ['Gastos propiedades', 'Gastos oficina'],
        datasets: [{ data: [gastosProp, gastosOficina], backgroundColor: ['#ef4444','#f59e0b'] }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    new Chart(document.getElementById('chartResult'), {
      type: 'bar',
      data: {
        labels: ['Facturación', 'Gastos', 'Rentabilidad'],
        datasets: [{ data: [comisiones, gastosProp + gastosOficina, rentabilidad], backgroundColor: ['#10b981','#ef4444', rentabilidad>=0?'#3b82f6':'#ef4444'] }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });
  });
}

function abrirModalFinanza() {
  document.getElementById('modalBox').innerHTML = '<div class="modal-header"><span class="modal-title">Nuevo movimiento de oficina</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    + '<div class="row"><div class="form-group"><label>Tipo</label><select id="ff-tipo"><option>Ingreso</option><option>Gasto</option></select></div>'
    + '<div class="form-group"><label>Fecha</label><input id="ff-fecha" type="date" value="' + today() + '" /></div></div>'
    + '<div class="form-group"><label>Concepto</label><input id="ff-concepto" autocomplete="off" /></div>'
    + '<div class="form-group"><label>Monto ($)</label><input id="ff-monto" type="number" /></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarFinanza()">Guardar</button></div>';
  openModal();
}

function guardarFinanza() {
  var data = { id: uid(), fecha: document.getElementById('ff-fecha').value, tipo: document.getElementById('ff-tipo').value, concepto: document.getElementById('ff-concepto').value, monto: document.getElementById('ff-monto').value, agente: currentUser.nombre };

function eliminarFin(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;

  deleteRow('Finanzas', id, function() { loadFinanzas(); });
}

// OBJETIVOS
function loadObjetivos() {
  getSheet('Objetivos', function(e, objs) {
    if (currentUser.rol !== 'Líder') {
      objs = (objs||[]).filter(function(o){return o.agente === currentUser.nombre || o.agente === 'Equipo';});
    } else {
      objs = objs || [];
    }
    var html = '<div class="section-header"><div class="section-title">Objetivos</div><button class="btn btn-primary btn-sm" onclick="abrirModalObjetivo()">+ Agregar</button></div>';
    if (objs.length) {
      objs.forEach(function(o) {
        var p = pct(o.actual, o.meta);
        html += '<div class="obj-card">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
          + '<div><div style="font-weight:600;font-size:14px">' + o.titulo + '</div>'
          + '<div style="font-size:12px;color:#888;margin-top:3px">' + o.agente + (o.vencimiento ? ' · Vence ' + o.vencimiento : '') + ' · ' + (o.periodo||'') + '</div></div>'
          + '<div style="text-align:right"><div style="font-size:20px;font-weight:700">' + o.actual + ' <span style="font-size:13px;color:#888;font-weight:400">/ ' + o.meta + ' ' + o.unidad + '</span></div>'
          + '<div style="font-size:12px;color:#888">' + p + '% completado</div></div></div>'
          + '<div class="progress-bar"><div class="progress-fill" style="width:' + p + '%;background:' + progColor(p) + '"></div></div>'
          + '<div class="obj-actions"><button class="btn btn-sm btn-primary" onclick="actualizarProgreso(\'' + o.id + '\',\'' + o.titulo + '\',' + o.actual + ',' + o.meta + ',\'' + o.unidad + '\')">Actualizar</button>'
          + '<button class="btn btn-sm" onclick="eliminarObj(\'' + o.id + '\')">Eliminar</button></div>'
          + '</div>';
      });
    } else {
      html += '<div class="empty">No hay objetivos. Agregá el primero.</div>';
    }
    document.getElementById('tabContent').innerHTML = html;
  });
}

function abrirModalObjetivo() {
  document.getElementById('modalBox').innerHTML = '<div class="modal-header"><span class="modal-title">Nuevo objetivo</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    + '<div class="form-group"><label>Título</label><input id="fo-titulo" autocomplete="off" /></div>'
    + '<div class="row"><div class="form-group"><label>Meta</label><input id="fo-meta" type="number" /></div>'
    + '<div class="form-group"><label>Unidad</label><input id="fo-unidad" placeholder="ventas, USD..." autocomplete="off" /></div></div>'
    + '<div class="row"><div class="form-group"><label>Período</label><select id="fo-periodo"><option>Mensual</option><option>Anual</option></select></div>'
    + '<div class="form-group"><label>Vencimiento</label><input id="fo-venc" type="date" /></div></div>'
    + '<div class="form-group"><label>Agente</label><select id="fo-agente"><option>Equipo</option><option>Gonzalo Olivera</option><option>Gonzalo Quintana</option></select></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarObjetivo()">Guardar</button></div>';
  openModal();
}

function guardarObjetivo() {
  var data = { id: uid(), titulo: document.getElementById('fo-titulo').value, meta: document.getElementById('fo-meta').value, actual: 0, unidad: document.getElementById('fo-unidad').value, periodo: document.getElementById('fo-periodo').value, agente: document.getElementById('fo-agente').value, vencimiento: document.getElementById('fo-venc').value };
  closeModal();
  loading();
  addRow('Objetivos', data, function() { loadObjetivos(); });
}

function actualizarProgreso(id, titulo, actual, meta, unidad) {
  document.getElementById('modalBox').innerHTML = '<div class="modal-header"><span class="modal-title">Actualizar progreso</span><button class="close-btn" onclick="closeModal()">×</button></div>'
    + '<div style="font-size:14px;margin-bottom:1rem;font-weight:500">' + titulo + '</div>'
    + '<div class="form-group"><label>Progreso actual (de ' + meta + ' ' + unidad + ')</label><input id="upd-actual" type="number" value="' + actual + '" /></div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarProgreso(\'' + id + '\')">Guardar</button></div>';
  openModal();
}

function guardarProgreso(id) {
  var actual = document.getElementById('upd-actual').value;
  closeModal();
  loading();
  updateRow('Objetivos', id, { actual: actual }, function() { loadObjetivos(); });
}

function eliminarObj(id) {
  if (!confirm('¿Eliminar este objetivo?')) return;
  loading();
  deleteRow('Objetivos', id, function() { loadObjetivos(); });
}

function loading() { document.getElementById('tabContent').innerHTML = '<div class="loading"><span class="spinner"></span>Cargando...</div>'; }
function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('modalBox').innerHTML = ''; }
function closeModalOverlay(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
</script>
